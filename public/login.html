<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fighter Modz — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:    #6c8aff;
    --accent2:   #c084fc;
    --accent3:   #f472b6;
    --glass-bg:  rgba(10, 8, 25, 0.52);
    --glass-border: rgba(180, 160, 255, 0.18);
    --text:      #f0ecff;
    --text2:     #c4b8f0;
    --text3:     rgba(180,160,255,0.55);
    --surface:   rgba(20, 14, 45, 0.55);
    --mono:      'Space Mono', monospace;
    --display:   'Cinzel', serif;
    --body:      'Zen Kaku Gothic New', sans-serif;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: var(--body);
    background: #070510; position: relative;
  }

  /* ── BACKGROUND ─────────────────────────────────────────── */
  .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

  .bg-scene::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 70% 40%, rgba(108,50,180,.45) 0%, transparent 65%),
      radial-gradient(ellipse 60% 80% at 20% 60%, rgba(20,10,80,.7) 0%, transparent 70%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(60,10,100,.55) 0%, transparent 60%),
      linear-gradient(165deg, #0a0520 0%, #120830 40%, #0d0525 70%, #060312 100%);
    z-index: 1;
  }

  .aurora {
    position: absolute; inset: 0; z-index: 2;
    background:
      radial-gradient(ellipse 120% 50% at 60% -10%, rgba(108,138,255,.22) 0%, transparent 60%),
      radial-gradient(ellipse 80% 40% at 85% 20%, rgba(192,132,252,.18) 0%, transparent 55%),
      radial-gradient(ellipse 60% 30% at 10% 90%, rgba(244,114,182,.12) 0%, transparent 50%);
    animation: aurora-drift 12s ease-in-out infinite alternate;
  }
  @keyframes aurora-drift {
    0%   { transform: translateX(0) translateY(0) scale(1); opacity:.9; }
    33%  { transform: translateX(20px) translateY(-15px) scale(1.04); opacity:1; }
    66%  { transform: translateX(-15px) translateY(10px) scale(.97); opacity:.85; }
    100% { transform: translateX(10px) translateY(-5px) scale(1.02); opacity:.95; }
  }

  .city-layer { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 3; }

  .petals { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .petal { position: absolute; width: 8px; height: 8px; opacity: 0; animation: petal-fall linear infinite; }
  .petal::before {
    content: ''; display: block; width:100%; height:100%;
    background: radial-gradient(ellipse at 40% 30%, rgba(255,180,210,.9), rgba(240,120,180,.4));
    border-radius: 0 100% 0 100%; transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(255,150,200,.5);
  }
  @keyframes petal-fall {
    0%   { transform: translateY(-60px) translateX(0) rotate(0deg); opacity:0; }
    10%  { opacity:.85; }
    90%  { opacity:.6; }
    100% { transform: translateY(110vh) translateX(80px) rotate(540deg); opacity:0; }
  }

  .scanlines {
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  }

  .stars { position: absolute; inset: 0; z-index: 2; }
  .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%,100% { opacity:.2; transform:scale(1); }
    50%      { opacity:1;  transform:scale(1.5); }
  }

  /* ── PAGE ───────────────────────────────────────────────── */
  .page {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px; padding: 24px 20px;
    animation: page-in .9s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes page-in {
    from { opacity:0; transform:translateY(30px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* ── BRAND ───────────────────────────────────────────────── */
  .brand { text-align: center; margin-bottom: 28px; }

  .logo-ring { width:64px; height:64px; margin:0 auto 14px; position:relative; }
  .logo-ring::before {
    content:''; position:absolute; inset:-4px; border-radius:50%;
    background: conic-gradient(var(--accent), var(--accent2), var(--accent3), var(--accent));
    animation: spin 4s linear infinite;
  }
  .logo-ring::after {
    content:''; position:absolute; inset:0; border-radius:50%; background:#0e0828;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-inner {
    position:absolute; inset:4px; z-index:1; border-radius:50%;
    background: linear-gradient(135deg, rgba(108,138,255,.25), rgba(192,132,252,.25));
    backdrop-filter: blur(4px);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; border:1px solid rgba(180,160,255,.3);
  }

  .brand-name {
    font-family: var(--display); font-size:1.5rem; font-weight:700;
    letter-spacing:.18em; text-transform:uppercase;
    background: linear-gradient(135deg, #e0d8ff 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .brand-sub {
    font-family: var(--mono); font-size:.6rem;
    letter-spacing:.22em; text-transform:uppercase; color:var(--text3); margin-top:5px;
  }

  /* ── CARD ────────────────────────────────────────────────── */
  .card {
    background: var(--glass-bg); border:1px solid var(--glass-border);
    border-radius:20px; padding:32px 28px;
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04) inset,
      0 2px 80px rgba(108,60,200,.2),
      0 32px 64px rgba(0,0,0,.5);
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
    background: linear-gradient(90deg, transparent, rgba(200,180,255,.5), transparent);
  }
  .card::after {
    content:''; position:absolute; top:-30px; right:-30px;
    width:100px; height:100px;
    background: radial-gradient(circle, rgba(192,132,252,.12) 0%, transparent 70%);
    border-radius:50%;
  }

  /* ── FIELDS ──────────────────────────────────────────────── */
  .field { margin-bottom:16px; }
  .field label {
    display:block; font-family:var(--mono); font-size:.62rem;
    letter-spacing:.14em; text-transform:uppercase; color:var(--text3); margin-bottom:7px;
  }
  .field-wrap { position:relative; display:flex; align-items:center; }
  .field-icon { position:absolute; left:13px; font-size:13px; opacity:.5; z-index:1; pointer-events:none; }
  .field input {
    width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(180,160,255,.15);
    border-radius:10px; padding:11px 13px 11px 38px; color:var(--text);
    font-family:var(--body); font-size:.85rem; outline:none; transition:all .25s; backdrop-filter:blur(8px);
  }
  .field input::placeholder { color:rgba(180,160,255,.3); }
  .field input:focus {
    border-color:rgba(108,138,255,.5); background:rgba(108,138,255,.06);
    box-shadow:0 0 0 3px rgba(108,138,255,.12), 0 0 20px rgba(108,138,255,.08);
  }
  .field-line {
    position:absolute; bottom:0; left:50%; right:50%; height:2px;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:1px;
    transition:left .3s ease, right .3s ease; pointer-events:none;
  }
  .field input:focus ~ .field-line { left:0; right:0; }

  /* ── DIVIDER ─────────────────────────────────────────────── */
  .divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
  .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(180,160,255,.2),transparent); }
  .divider-text { font-family:var(--mono); font-size:.55rem; letter-spacing:.14em; text-transform:uppercase; color:var(--text3); }

  /* ── BUTTON ──────────────────────────────────────────────── */
  .btn-login {
    width:100%; padding:13px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 60%,var(--accent3) 100%);
    background-size:200% 200%;
    border:none; border-radius:11px; color:#fff; font-family:var(--display);
    font-size:.8rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    cursor:pointer; position:relative; overflow:hidden; transition:all .3s;
    box-shadow:0 4px 32px rgba(108,100,255,.35); animation:gradient-shift 4s ease infinite;
  }
  @keyframes gradient-shift {
    0%,100% { background-position:0% 50%; }
    50%      { background-position:100% 50%; }
  }
  .btn-login::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
    opacity:0; transition:opacity .25s;
  }
  .btn-login:hover::before { opacity:1; }
  .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 40px rgba(108,100,255,.5); }
  .btn-login:active { transform:translateY(0); }
  .btn-login::after {
    content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
    transform:skewX(-20deg); animation:btn-shine 3.5s ease-in-out infinite;
  }
  @keyframes btn-shine { 0%{left:-100%;} 20%,100%{left:150%;} }

  /* ── ERROR ───────────────────────────────────────────────── */
  .msg-err {
    margin-top:12px; padding:10px 14px;
    background:rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.3);
    border-radius:8px; color:#fb7185; font-family:var(--mono); font-size:.68rem;
    letter-spacing:.06em; display:none; align-items:center; gap:8px;
    animation:shake .35s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-5px);} 40%,80%{transform:translateX(5px);} }

  /* ── KANJI DECO ──────────────────────────────────────────── */
  .kanji-deco {
    position:absolute; right:18px; top:16px; font-family:var(--body); font-size:.75rem; font-weight:700;
    writing-mode:vertical-rl; letter-spacing:.12em; color:rgba(180,160,255,.12);
    user-select:none; pointer-events:none; line-height:1.4;
  }

  /* ── STATUS BAR ──────────────────────────────────────────── */
  .status-bar {
    margin-top:14px; display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:rgba(10,8,25,.4); border:1px solid rgba(180,160,255,.08);
    border-radius:10px; backdrop-filter:blur(12px);
  }
  .status-dot {
    width:6px; height:6px; border-radius:50%; background:#34d399;
    box-shadow:0 0 8px rgba(52,211,153,.6); animation:pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .status-text { font-family:var(--mono); font-size:.58rem; letter-spacing:.1em; color:var(--text3); }
  .status-id { font-family:var(--mono); font-size:.55rem; color:rgba(180,160,255,.3); letter-spacing:.08em; }

  /* ── FOOTER ──────────────────────────────────────────────── */
  .footer {
    text-align:center; margin-top:22px; font-family:var(--mono); font-size:.58rem;
    letter-spacing:.16em; text-transform:uppercase; color:rgba(160,140,220,.35);
    display:flex; align-items:center; justify-content:center; gap:12px;
  }
  .footer span { display:flex; align-items:center; gap:5px; }
  .dot { width:3px; height:3px; border-radius:50%; background:rgba(160,140,220,.3); }
</style>
</head>

<!-- CONTENT -->
<div class="page">
  <div class="brand">
    <div class="logo-ring">
      <div class="logo-inner">⚡</div>
    </div>
    <div class="brand-name">Aerivue</div>
    <div class="brand-sub">API Management System</div>
  </div>

  <div class="card">
    <div class="kanji-deco">管理<br>認証<br>接続</div>

    <div class="field">
      <label>Username</label>
      <div class="field-wrap">
        <span class="field-icon">◈</span>
        <input type="text" id="usr" placeholder="Enter username" autocomplete="username">
        <div class="field-line"></div>
      </div>
    </div>

    <div class="field" style="margin-bottom:0">
      <label>Password</label>
      <div class="field-wrap">
        <span class="field-icon">◇</span>
        <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
        <div class="field-line"></div>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Secure Auth</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div id="err" class="msg-err"></div>
  </div>

  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot"></div>
      <div class="status-text">System Online</div>
    </div>
    <div class="status-id">NODE-AX7 · v3.2.1</div>
  </div>

  <div class="footer">
    <span>⚡ Secure</span><div class="dot"></div>
    <span>⟡ Private</span><div class="dot"></div>
    <span>◈ Fast</span>
  </div>
</div>

<script>
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=Math.random()*2+.5;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*75+'%;width:'+sz+'px;height:'+sz+'px;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+(Math.random()*5)+'s';
    c.appendChild(s);
  }
})();

(function(){
  var c=document.getElementById('petals');
  for(var i=0;i<18;i++){
    var p=document.createElement('div'); p.className='petal';
    var sz=5+Math.random()*7;
    p.style.cssText='left:'+Math.random()*100+'%;top:'+(-20+Math.random()*-60)+'px;width:'+sz+'px;height:'+sz+'px;animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(Math.random()*12)+'s';
    c.appendChild(p);
  }
})();

async function doLogin(){
  var usr=document.getElementById('usr').value.trim();
  var pwd=document.getElementById('pwd').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('loginBtn');
  err.style.display='none';
  if(!usr||!pwd){
    err.textContent='✗  All fields required';
    err.style.display='flex';
    err.style.animation='none'; err.offsetHeight; err.style.animation='';
    return;
  }
  btn.textContent='Authenticating…'; btn.disabled=true;
  try{
    var res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:usr,password:pwd})});
    var data=await res.json();
    if(res.ok){
      btn.textContent='✓ Granted';
      btn.style.background='linear-gradient(135deg,#059669,#10b981)';
      setTimeout(function(){window.location.href=data.role==='superadmin'?'/admin/dashboard':'/admin/panel';},600);
    } else {
      err.textContent='✗  '+(data.error||'Authentication failed');
      err.style.display='flex';
      btn.textContent='Sign In'; btn.disabled=false;
    }
  } catch(e){
    err.textContent='✗  Network error — check connection';
    err.style.display='flex';
    btn.textContent='Sign In'; btn.disabled=false;
  }
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
