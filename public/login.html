<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NexusAPI — Secure Access</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#060914;
  --void:#03040a;
  --cyan:#00e5ff;
  --violet:#7c3aed;
  --pink:#f0abfc;
  --surface:rgba(255,255,255,0.035);
  --border:rgba(0,229,255,0.12);
  --text:#e2e8f8;
  --muted:#64748b;
  --mono:'DM Mono',monospace;
  --sans:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--sans);
  background:var(--void);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;
}

/* ── GRID BG ── */
.grid-bg{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
}

/* ── GLOW ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none}
.orb-a{width:500px;height:500px;background:rgba(124,58,237,0.12);top:-150px;left:-100px}
.orb-b{width:400px;height:400px;background:rgba(0,229,255,0.08);bottom:-100px;right:-100px;animation:drift 10s ease-in-out infinite alternate}
.orb-c{width:200px;height:200px;background:rgba(240,171,252,0.07);top:40%;left:55%}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(-40px,-30px)}}

/* ── SCAN LINES ── */
.scanlines{
  position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
}

/* ── WRAPPER ── */
.wrapper{
  position:relative;z-index:10;
  width:100%;max-width:400px;
  padding:20px;
  animation:up .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

/* ── LOGO ── */
.logo{text-align:center;margin-bottom:32px}
.logo-hex{
  width:56px;height:56px;margin:0 auto 16px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.logo-hex::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  animation:hexspin 6s linear infinite;
}
@keyframes hexspin{to{filter:hue-rotate(360deg)}}
.logo-hex-inner{
  position:relative;z-index:1;
  font-size:20px;
}
.logo-name{
  font-size:1.4rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(135deg,#fff 0%,var(--cyan) 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{
  font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);margin-top:4px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 28px;
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  box-shadow:0 0 0 1px rgba(255,255,255,0.03) inset,0 4px 80px rgba(0,0,0,0.6);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,0.4),transparent);
}

/* ── FIELD ── */
.field{margin-bottom:18px}
.field-label{
  display:block;font-family:var(--mono);font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
.field-box{
  position:relative;display:flex;align-items:center;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  background:rgba(255,255,255,0.02);
  transition:border-color .2s,box-shadow .2s;
}
.field-box:focus-within{
  border-color:rgba(0,229,255,0.35);
  box-shadow:0 0 0 3px rgba(0,229,255,0.07);
}
.field-ic{
  position:absolute;left:14px;font-size:12px;opacity:.4;
  pointer-events:none;
}
.field-box input{
  width:100%;background:transparent;border:none;outline:none;
  padding:12px 14px 12px 38px;
  color:var(--text);font-family:var(--sans);font-size:.85rem;
}
.field-box input::placeholder{color:rgba(255,255,255,0.2)}

/* ── LINE ── */
.sep{display:flex;align-items:center;gap:10px;margin:20px 0}
.sep-line{flex:1;height:1px;background:rgba(255,255,255,0.06)}
.sep-text{font-family:var(--mono);font-size:.55rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}

/* ── BUTTON ── */
.btn-sign{
  width:100%;padding:13px;border:none;border-radius:11px;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  color:#fff;font-family:var(--sans);font-size:.82rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
  position:relative;overflow:hidden;transition:all .3s;
  box-shadow:0 4px 24px rgba(124,58,237,0.35);
}
.btn-sign::after{
  content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  transform:skewX(-20deg);animation:shine 3s ease-in-out infinite;
}
@keyframes shine{0%{left:-120%}30%,100%{left:140%}}
.btn-sign:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(124,58,237,0.5)}
.btn-sign:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── ERROR ── */
.err-box{
  display:none;margin-top:12px;
  padding:10px 14px;border-radius:8px;
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  color:#fca5a5;font-family:var(--mono);font-size:.68rem;letter-spacing:.04em;
  align-items:center;gap:8px;
}

/* ── STATUS ── */
.status{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;padding:8px 14px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);
  border-radius:10px;backdrop-filter:blur(10px);
}
.s-dot{width:6px;height:6px;border-radius:50%;background:#22d3ee;box-shadow:0 0 8px #22d3ee;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-txt{font-family:var(--mono);font-size:.58rem;color:var(--muted);letter-spacing:.08em}
.s-id{font-family:var(--mono);font-size:.55rem;color:rgba(255,255,255,0.2)}

/* ── FOOTER ── */
.foot{
  text-align:center;margin-top:18px;
  font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;
  color:rgba(255,255,255,0.15);text-transform:uppercase;
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<div class="orb orb-c"></div>
<div class="scanlines"></div>

<div class="wrapper">
  <div class="logo">
    <div class="logo-hex"><div class="logo-hex-inner">⬡</div></div>
    <div class="logo-name">NexusAPI</div>
    <div class="logo-sub">Secure Admin Portal</div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">Username</label>
      <div class="field-box">
        <span class="field-ic">◈</span>
        <input type="text" id="usr" placeholder="Enter username" autocomplete="username">
      </div>
    </div>

    <div class="field" style="margin-bottom:0">
      <label class="field-label">Password</label>
      <div class="field-box">
        <span class="field-ic">◇</span>
        <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-text">Authenticate</div>
      <div class="sep-line"></div>
    </div>

    <button class="btn-sign" id="btn" onclick="login()">Access Portal</button>
    <div class="err-box" id="err"></div>
  </div>

  <div class="status">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="s-dot"></div>
      <div class="s-txt">All systems operational</div>
    </div>
    <div class="s-id">v2.0.0 · NEXUS</div>
  </div>

  <div class="foot">Credit: @Boss_Hcrr &nbsp;·&nbsp; Developer: @Boss_Hcrr</div>
</div>

<script>
async function login(){
  var usr=document.getElementById('usr').value.trim();
  var pwd=document.getElementById('pwd').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('btn');
  err.style.display='none';
  if(!usr||!pwd){err.textContent='⚠ All fields required';err.style.display='flex';return}
  btn.textContent='Verifying…';btn.disabled=true;
  try{
    var r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:usr,password:pwd})});
    var d=await r.json();
    if(r.ok){
      btn.textContent='✓ Access Granted';
      btn.style.background='linear-gradient(135deg,#10b981,#059669)';
      setTimeout(function(){window.location.href=d.role==='superadmin'?'/admin/dashboard':'/admin/panel'},600);
    }else{
      err.textContent='✗ '+(d.error||'Authentication failed');
      err.style.display='flex';
      btn.textContent='Access Portal';btn.disabled=false;
    }
  }catch(e){
    err.textContent='✗ Network error';err.style.display='flex';
    btn.textContent='Access Portal';btn.disabled=false;
  }
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')login()});
</script>
</body>
</html>
