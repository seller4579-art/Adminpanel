<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Fighter Modz · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#171310;
  --panel:rgba(255,247,237,0.045);
  --panel-border:rgba(255,247,237,0.10);
  --amber:#f0a84e;
  --coral:#f0785a;
  --sage:#9db88b;
  --text:#f4ede4;
  --text2:#b3a595;
  --text3:#6f6255;
  --danger:#e8756a;
  --mono:'Space Mono',monospace;
  --serif:'Fraunces',serif;
  --sans:'Manrope',sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:20px;
}
/* soft grain-paper backdrop */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 22% 15%, rgba(240,168,78,0.16) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 80%, rgba(240,120,90,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 60% 100%, rgba(157,184,139,0.07) 0%, transparent 55%);
}
.texture{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(circle at 1px 1px, rgba(244,237,228,0.05) 1px, transparent 0);
  background-size:22px 22px;
}
.ring{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  border:1px solid rgba(240,168,78,0.12);
}
.ring1{width:520px;height:520px;top:-180px;right:-160px}
.ring2{width:340px;height:340px;bottom:-120px;left:-100px;border-color:rgba(240,120,90,0.1)}

.wrap{position:relative;z-index:10;width:100%;max-width:392px;animation:rise .65s cubic-bezier(.16,1,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:30px}
.mark{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(150deg,var(--amber),var(--coral));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:700;font-size:1.3rem;color:#1a1310;
  box-shadow:0 8px 28px rgba(240,140,70,0.35);
}
.title{font-family:var(--serif);font-weight:600;font-size:1.55rem;letter-spacing:-0.01em}
.subtitle{font-family:var(--mono);font-size:.63rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}

.panel{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:6px;
  padding:34px 30px;
  backdrop-filter:blur(18px);
  box-shadow:0 24px 70px rgba(0,0,0,.45);
  position:relative;
}
.panel::before{
  content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(240,168,78,0.35),transparent);
}

.field{margin-bottom:18px}
.field label{
  display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text3);margin-bottom:8px;
}
.input-wrap input{
  width:100%;background:rgba(255,247,237,0.03);
  border:1px solid rgba(255,247,237,0.12);
  border-radius:4px;padding:12px 14px;
  color:var(--text);font-family:var(--sans);font-size:.86rem;
  outline:none;transition:all .2s;
}
.input-wrap input:focus{
  border-color:rgba(240,168,78,0.55);
  box-shadow:0 0 0 3px rgba(240,168,78,0.1);
}
.input-wrap input::placeholder{color:var(--text3)}

.btn{
  width:100%;padding:13px;margin-top:8px;border:none;border-radius:4px;
  background:linear-gradient(135deg,var(--amber),var(--coral));
  color:#1a1310;font-family:var(--sans);font-weight:700;font-size:.85rem;
  cursor:pointer;transition:all .2s;letter-spacing:.01em;
  box-shadow:0 10px 26px rgba(240,140,70,0.3);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 14px 34px rgba(240,140,70,0.4)}
.btn:disabled{opacity:.6;cursor:default;transform:none}

.err{
  margin-top:14px;padding:11px 14px;border-radius:4px;
  background:rgba(232,117,106,0.1);border:1px solid rgba(232,117,106,0.3);
  color:var(--danger);font-family:var(--mono);font-size:.68rem;
  display:none;align-items:center;gap:8px;letter-spacing:.01em;
}

.foot{
  margin-top:20px;display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);
}
.foot .dot{width:5px;height:5px;border-radius:50%;background:var(--sage);box-shadow:0 0 6px var(--sage);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>

<div class="texture"></div>
<div class="ring ring1"></div>
<div class="ring ring2"></div>

<div class="wrap">
  <div class="brand">
    <div class="mark">F</div>
    <div class="title">Fighter Modz</div>
    <div class="subtitle">API Access Console</div>
  </div>

  <div class="panel">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="usr" placeholder="your username" autocomplete="username">
      </div>
    </div>
    <div class="field" style="margin-bottom:6px">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div id="err" class="err"></div>
  </div>

  <div class="foot"><span class="dot"></span> Encrypted session · role-based access</div>
</div>

<script>
async function doLogin(){
  var usr=document.getElementById('usr').value.trim();
  var pwd=document.getElementById('pwd').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('loginBtn');
  err.style.display='none';
  if(!usr||!pwd){
    err.textContent='All fields are required';
    err.style.display='flex';
    return;
  }
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    var res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:usr,password:pwd})});
    var data=await res.json();
    if(res.ok){
      btn.textContent='Welcome';
      setTimeout(function(){window.location.href=data.role==='superadmin'?'/admin/dashboard':'/admin/panel';},350);
    } else {
      err.textContent=data.error||'Authentication failed';
      err.style.display='flex';
      btn.disabled=false; btn.textContent='Sign In';
    }
  }catch(e){
    err.textContent='Network error — check connection';
    err.style.display='flex';
    btn.disabled=false; btn.textContent='Sign In';
  }
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
