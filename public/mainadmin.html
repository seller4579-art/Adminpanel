<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Super Admin · Fighter Modz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#060612;--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.10);--glass-border2:rgba(255,255,255,0.16);--accent:#a78bfa;--accent2:#818cf8;--accent3:#38bdf8;--accent4:#f472b6;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--mono:'JetBrains Mono',monospace;--red:#f87171;--green:#4ade80;--yellow:#fbbf24;--blue:#60a5fa;--purple:#c084fc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(167,139,250,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 90%,rgba(56,189,248,0.10) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 50% 50%,rgba(244,114,182,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.025) 1px,transparent 0);background-size:32px 32px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(167,139,250,0.08);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:rgba(56,189,248,0.07);bottom:-50px;right:-80px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:rgba(244,114,182,0.06);top:40%;left:60%;animation-delay:-6s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-20px) scale(1.05)}}
.topbar{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(6,6,18,0.75);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--glass-border);z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:white;box-shadow:0 0 16px rgba(167,139,250,0.4)}
.brand-name{font-weight:700;font-size:.95rem}
.brand-tag{font-size:.6rem;font-family:var(--mono);background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.28);color:var(--accent);padding:2px 8px;border-radius:20px;letter-spacing:.05em}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:5px 12px;font-size:.78rem}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sidebar{position:fixed;top:60px;left:0;bottom:0;width:220px;background:rgba(6,6,18,0.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid var(--glass-border);padding:20px 12px;z-index:50;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-label{font-size:.6rem;font-family:var(--mono);color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text2);transition:all .2s;position:relative;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--glass2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(56,189,248,0.08));color:var(--accent);border-color:rgba(167,139,250,0.2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:linear-gradient(var(--accent),var(--accent3));border-radius:2px}
.nav-icon{font-size:.9rem}
.nav-badge{margin-left:auto;background:rgba(244,114,182,0.15);border:1px solid rgba(244,114,182,0.3);color:var(--accent4);font-size:.6rem;font-family:var(--mono);padding:1px 7px;border-radius:20px;font-weight:600}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:65px;background:rgba(6,6,18,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);z-index:100;padding:0 8px;align-items:center;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;border-radius:12px;cursor:pointer;transition:all .2s;position:relative;flex:1;max-width:80px}
.bnav-icon{font-size:1.1rem;transition:all .2s}
.bnav-label{font-size:.58rem;color:var(--text3);font-weight:500;transition:all .2s}
.bnav-item.active .bnav-icon{filter:drop-shadow(0 0 6px var(--accent))}
.bnav-item.active .bnav-label{color:var(--accent)}
.bnav-item.active{background:rgba(167,139,250,0.1)}
.bnav-badge{position:absolute;top:4px;right:8px;background:var(--accent4);color:white;font-size:.5rem;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.layout{display:flex;margin-top:60px;min-height:calc(100vh - 60px);position:relative;z-index:1}
.main{flex:1;margin-left:220px;padding:24px;min-height:100%}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.09),transparent)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:.88rem;font-weight:600;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:18px 16px;text-align:center;backdrop-filter:blur(10px);position:relative;overflow:hidden;transition:all .3s;cursor:default}
.stat-card:hover{border-color:rgba(167,139,250,0.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.stat-card::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.35}
.stat-num{font-size:2rem;font-weight:700;font-family:var(--mono);background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.stat-label{font-size:.65rem;color:var(--text3);margin-top:5px;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 4px 14px rgba(167,139,250,0.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(167,139,250,0.45);transform:translateY(-1px)}
.btn-ghost{background:var(--glass2);border:1px solid var(--glass-border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--glass-border2);color:var(--text)}
.btn-red{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red)}
.btn-red:hover{background:rgba(248,113,113,0.2)}
.btn-sm{padding:5px 10px;font-size:.72rem}
.table-wrap{overflow-x:auto;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:500px}
th{font-size:.6rem;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--glass-border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.028);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.018)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;font-family:var(--mono);font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);color:var(--green)}
.badge-red{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red)}
.badge-blue{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);color:var(--blue)}
.badge-yellow{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:var(--yellow)}
.badge-purple{background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.25);color:var(--purple)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:.7rem;font-weight:500;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
input[type=text],input[type=password]{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;transition:all .2s;outline:none;width:100%}
input:focus{border-color:rgba(167,139,250,0.5);box-shadow:0 0 0 3px rgba(167,139,250,0.1);background:rgba(255,255,255,0.06)}
input::placeholder{color:var(--text3)}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cb-item{padding:6px 12px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text3);font-size:.74rem;font-weight:500;cursor:pointer;transition:all .2s;user-select:none}
.cb-item.checked{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.4);color:var(--accent)}
.session-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;margin-bottom:8px;gap:12px}
.session-device{font-size:.8rem;font-weight:500;color:var(--text);margin-bottom:3px}
.session-meta{font-size:.66rem;color:var(--text3);font-family:var(--mono)}
.ep-item{background:rgba(0,0,0,0.25);border:1px solid var(--glass-border);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.ep-method{display:inline-block;font-size:.58rem;font-family:var(--mono);background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.28);color:var(--green);padding:1px 7px;border-radius:4px;margin-right:8px}
.ep-url{font-family:var(--mono);font-size:.68rem;color:var(--accent3);word-break:break-all}
.ep-prefix{font-size:.63rem;color:var(--text3);font-family:var(--mono);margin-top:4px}
.msg{margin-top:10px;padding:9px 14px;border-radius:8px;font-size:.78rem;font-weight:500;animation:fadeIn .2s ease}
.msg-ok{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--green)}
.msg-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.copy-btn{font-size:.6rem;font-family:var(--mono);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);color:var(--accent);padding:1px 6px;border-radius:4px;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:rgba(167,139,250,0.2)}
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.page-header-icon{width:38px;height:38px;background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(56,189,248,0.09));border:1px solid rgba(167,139,250,0.3);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.page-header-title{font-size:1.1rem;font-weight:700}
.page-header-sub{font-size:.7rem;color:var(--text3);margin-top:1px}
#mainContent{animation:contentIn .25s ease}
@keyframes contentIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
@media(max-width:768px){
.sidebar{display:none}
.bottom-nav{display:flex}
.main{margin-left:0;padding:16px 12px;padding-bottom:80px}
.stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.stat-num{font-size:1.6rem}
.grid2{grid-template-columns:1fr}
.topbar{padding:0 14px}
.brand-tag{display:none}
.card{padding:14px;border-radius:12px}
table{min-width:420px;font-size:.72rem}
th{padding:6px 8px}
td{padding:8px 8px}
}
@media(max-width:400px){
.stats-grid{gap:6px}
.stat-card{padding:14px 10px}
.stat-num{font-size:1.3rem}
.card{padding:12px}
.main{padding:12px 10px;padding-bottom:80px}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">A</div>
    <span class="brand-name">Aerivue</span>
    <span class="brand-tag">Super Admin</span>
  </div>
  <div class="topbar-right">
    <div class="user-pill"><span class="user-dot"></span><span id="topUser" style="font-weight:600">—</span></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <div class="nav-item active" id="nav-overview" onclick="goTo('overview')"><span class="nav-icon">◈</span> Overview</div>
      <div class="nav-item" id="nav-sessions" onclick="goTo('sessions')"><span class="nav-icon">⊙</span> Sessions<span class="nav-badge" id="sessionBadge">0</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Management</div>
      <div class="nav-item" id="nav-admins" onclick="goTo('admins')"><span class="nav-icon">◎</span> Admins</div>
      <div class="nav-item" id="nav-keys" onclick="goTo('keys')"><span class="nav-icon">◆</span> All Keys</div>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>
<div class="bottom-nav">
  <div class="bnav-item active" id="bnav-overview" onclick="goTo('overview')"><span class="bnav-icon">◈</span><span class="bnav-label">Overview</span></div>
  <div class="bnav-item" id="bnav-sessions" onclick="goTo('sessions')"><span class="bnav-icon">⊙</span><span class="bnav-label">Sessions</span><span class="bnav-badge" id="sessionBadgeMobile" style="display:none">0</span></div>
  <div class="bnav-item" id="bnav-admins" onclick="goTo('admins')"><span class="bnav-icon">◎</span><span class="bnav-label">Admins</span></div>
  <div class="bnav-item" id="bnav-keys" onclick="goTo('keys')"><span class="bnav-icon">◆</span><span class="bnav-label">Keys</span></div>
</div>
<script>
var API_TYPES=[],currentPane='overview';
async function api(url,opts){opts=opts||{};var res=await fetch(url,Object.assign({headers:{'Content-Type':'application/json'}},opts));return{status:res.status,data:await res.json()}}
function logout(){api('/admin/logout',{method:'POST'}).then(function(){window.location.href='/admin'})}
function parseDevice(ua){ua=ua||'';if(/mobile/i.test(ua))return'📱 Mobile';if(/tablet/i.test(ua))return'📟 Tablet';return'🖥 Desktop'}
function fmtDate(d){return new Date(d).toLocaleString()}
function fmtDateShort(d){return new Date(d).toLocaleDateString()}
function typeBadge(t){var a=API_TYPES.find(function(x){return x.type===t});return'<span class="badge badge-blue">'+(a?a.icon+' '+a.label:t)+'</span>'}
function accessBadges(types){if(!types||types.includes('all'))return'<span class="badge badge-purple">✦ All</span>';return types.map(typeBadge).join(' ')}
function copy(t){navigator.clipboard.writeText(t).catch(function(){var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el)})}
function showMsg(id,text,ok){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div class="msg '+(ok?'msg-ok':'msg-err')+'">'+(ok?'✓ ':'✗ ')+text+'</div>';setTimeout(function(){el.innerHTML=''},4000)}
function goTo(pane){
  currentPane=pane;
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});
  var n=document.getElementById('nav-'+pane);if(n)n.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(function(el){el.classList.remove('active')});
  var bn=document.getElementById('bnav-'+pane);if(bn)bn.classList.add('active');
  var mc=document.getElementById('mainContent');mc.style.animation='none';mc.offsetHeight;mc.style.animation='';
  ({overview:renderOverview,sessions:renderSessions,admins:renderAdmins,keys:renderKeys})[pane]()
}
async function renderOverview(){
  document.getElementById('mainContent').innerHTML='<div class="page-header"><div class="page-header-icon">◈</div><div><div class="page-header-title">Overview</div><div class="page-header-sub">System status & quick stats</div></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-num" id="sAdmins">—</div><div class="stat-label">Admins</div></div><div class="stat-card"><div class="stat-num" id="sKeys">—</div><div class="stat-label">Total Keys</div></div><div class="stat-card"><div class="stat-num" id="sActive">—</div><div class="stat-label">Active</div></div><div class="stat-card"><div class="stat-num" id="sSessions">—</div><div class="stat-label">Sessions</div></div></div><div class="card"><div class="card-header"><div class="card-title">⊙ My Sessions</div><button class="btn btn-ghost btn-sm" onclick="loadMySessions()">↺</button></div><div id="mySessionsWrap"><div style="color:var(--text3);font-size:.78rem">Loading...</div></div></div><div class="card"><div class="card-header"><div class="card-title">◈ API Endpoints</div></div><div id="epList"></div></div>';
  var r=await api('/admin/api/stats');
  ['sAdmins','sKeys','sActive','sSessions'].forEach(function(id,i){var k=['totalAdmins','totalKeys','activeKeys','totalSessions'][i];document.getElementById(id).textContent=r.data[k]!==undefined?r.data[k]:'—'});
  var epHtml='';API_TYPES.forEach(function(a){epHtml+='<div class="ep-item"><div><span class="ep-method">GET</span><span class="ep-url">'+a.route+'?'+a.paramName+'=VALUE&apikey=YOUR_KEY</span></div><div class="ep-prefix">Prefix: '+a.prefix+'...</div></div>'});
  document.getElementById('epList').innerHTML=epHtml||'<p style="color:var(--text3);font-size:.78rem">No APIs configured.</p>';
  loadMySessions();refreshSessionBadge()
}
async function loadMySessions(){
  var wrap=document.getElementById('mySessionsWrap');if(!wrap)return;
  var r=await api('/admin/api/sessions/me');
  wrap.innerHTML=(!r.data.sessions||!r.data.sessions.length)?'<p style="color:var(--text3);font-size:.78rem">No active sessions.</p>':r.data.sessions.map(function(s){return sessionCard(s,true)}).join('')
}
async function refreshSessionBadge(){
  var r=await api('/admin/api/sessions/all');var c=r.data.total||0;
  var b=document.getElementById('sessionBadge'),bm=document.getElementById('sessionBadgeMobile');
  if(b)b.textContent=c;if(bm){bm.textContent=c;bm.style.display=c>0?'flex':'none'}
}
function sessionCard(s,canRevoke){
  return'<div class="session-item"><div><div class="session-device">'+parseDevice(s.userAgent)+'</div><div class="session-meta" style="margin-top:3px">IP: '+s.ip+' · '+fmtDate(s.createdAt)+'</div><div class="session-meta">Last: '+fmtDate(s.lastSeen)+'</div></div>'+(canRevoke?'<button class="btn btn-red btn-sm" onclick="revokeSession(\''+s._id+'\')">Revoke</button>':'')+'</div>'
}
async function revokeSession(id){
  if(!confirm('Revoke this session?'))return;
  await api('/admin/api/sessions/'+id,{method:'DELETE'});
  if(currentPane==='overview')loadMySessions();
  if(currentPane==='sessions')renderSessions();
  refreshSessionBadge()
}
async function renderSessions(){
  document.getElementById('mainContent').innerHTML='<div class="page-header"><div class="page-header-icon">⊙</div><div><div class="page-header-title">Sessions</div><div class="page-header-sub">All active admin sessions</div></div></div><div class="card"><div class="card-header"><div class="card-title">⊙ All Active Sessions</div><button class="btn btn-ghost btn-sm" onclick="renderSessions()">↺ Refresh</button></div><div id="allSessionsWrap"><div style="color:var(--text3);font-size:.78rem">Loading...</div></div></div>';
  var r=await api('/admin/api/sessions/all');refreshSessionBadge();
  var wrap=document.getElementById('allSessionsWrap');
  if(!r.data.byUser||!Object.keys(r.data.byUser).length){wrap.innerHTML='<p style="color:var(--text3);font-size:.78rem">No active sessions.</p>';return}
  var html='';
  Object.keys(r.data.byUser).forEach(function(user){
    var sessions=r.data.byUser[user],isSA=(user===document.getElementById('topUser').textContent);
    html+='<div style="margin-bottom:18px"><div style="font-size:.68rem;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">◎ '+user+' <span class="badge badge-blue">'+sessions.length+'</span>'+(!isSA?'<button class="btn btn-red btn-sm" onclick="revokeAllUser(\''+user+'\')">Revoke All</button>':'')+' </div>'+sessions.map(function(s){return sessionCard(s,true)}).join('')+'</div>'
  });wrap.innerHTML=html
}
async function revokeAllUser(username){
  if(!confirm('Revoke ALL sessions for '+username+'?'))return;
  await api('/admin/api/sessions/user/'+username,{method:'DELETE'});renderSessions()
}
async function renderAdmins(){
  var tc=API_TYPES.map(function(a){return'<div class="cb-item" data-type="'+a.type+'" onclick="toggleCb(this)">'+a.icon+' '+a.label+'</div>'}).join('');
  document.getElementById('mainContent').innerHTML='<div class="page-header"><div class="page-header-icon">◎</div><div><div class="page-header-title">Admins</div><div class="page-header-sub">Create and manage admin accounts</div></div></div><div class="card"><div class="card-header"><div class="card-title">+ Create Admin</div></div><div class="grid2" style="margin-bottom:14px"><div class="field"><label>Username</label><input type="text" id="newAdminUser" placeholder="admin_name"></div><div class="field"><label>Password</label><input type="password" id="newAdminPass" placeholder="••••••••"></div></div><div class="field"><label>API Access</label><div class="checkbox-group" id="cbGroup"><div class="cb-item checked" data-type="all" onclick="toggleCb(this)">✦ All Access</div>'+tc+'</div></div><div style="margin-top:16px"><button class="btn btn-primary" onclick="createAdmin()">Create Admin</button></div><div id="adminMsg"></div></div><div class="card"><div class="card-header"><div class="card-title">◎ All Admins</div><button class="btn btn-ghost btn-sm" onclick="loadAdminTable()">↺</button></div><div class="table-wrap"><table><thead><tr><th>Username</th><th>Access</th><th>Keys</th><th>Sessions</th><th>Created</th><th></th></tr></thead><tbody id="adminTable"><tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">Loading...</td></tr></tbody></table></div></div>';
  loadAdminTable()
}
function toggleCb(el){
  var g=document.getElementById('cbGroup');if(!g)return;
  var a=g.querySelector('[data-type="all"]');
  if(el.dataset.type==='all'){g.querySelectorAll('.cb-item').forEach(function(c){c.classList.add('checked')})}
  else{if(a)a.classList.remove('checked');el.classList.toggle('checked');if(!Array.from(g.querySelectorAll('.cb-item:not([data-type="all"])')).some(function(c){return c.classList.contains('checked')})&&a)a.classList.add('checked')}
}
function getSelectedAccess(){
  var g=document.getElementById('cbGroup');if(!g)return['all'];
  var a=g.querySelector('[data-type="all"]');
  if(a&&a.classList.contains('checked'))return['all'];
  return Array.from(g.querySelectorAll('.cb-item:not([data-type="all"])')).filter(function(c){return c.classList.contains('checked')}).map(function(c){return c.dataset.type})
}
async function loadAdminTable(){
  var tb=document.getElementById('adminTable');if(!tb)return;
  var r=await api('/admin/api/admins');
  if(!r.data.admins||!r.data.admins.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">No admins yet</td></tr>';return}
  tb.innerHTML=r.data.admins.map(function(a){return'<tr><td style="font-weight:600;color:var(--text)">'+a.username+'</td><td>'+accessBadges(a.allowedTypes)+'</td><td><span class="badge badge-blue">'+a.keyCount+'</span></td><td><span class="badge '+(a.sessionCount>0?'badge-green':'badge-yellow')+'">'+a.sessionCount+'</span></td><td style="font-family:var(--mono);font-size:.66rem;color:var(--text3)">'+fmtDateShort(a.createdAt)+'</td><td><button class="btn btn-red btn-sm" onclick="deleteAdmin(\''+a.username+'\')">Delete</button></td></tr>'}).join('')
}
async function createAdmin(){
  var u=document.getElementById('newAdminUser').value.trim(),p=document.getElementById('newAdminPass').value,t=getSelectedAccess();
  if(!u||!p){showMsg('adminMsg','Fill all fields',false);return}
  var r=await api('/admin/api/admins',{method:'POST',body:JSON.stringify({username:u,password:p,allowedTypes:t})});
  showMsg('adminMsg',r.data.message||r.data.error,r.status===201);
  if(r.status===201){document.getElementById('newAdminUser').value='';document.getElementById('newAdminPass').value='';loadAdminTable()}
}
async function deleteAdmin(username){
  if(!confirm('Delete admin "'+username+'" and ALL their API keys?'))return;
  var r=await api('/admin/api/admins/'+username,{method:'DELETE'});
  showMsg('adminMsg',r.data.message||r.data.error,r.status===200);loadAdminTable()
}
async function renderKeys(){
  document.getElementById('mainContent').innerHTML='<div class="page-header"><div class="page-header-icon">◆</div><div><div class="page-header-title">All Keys</div><div class="page-header-sub">Manage API keys across all admins</div></div></div><div class="card"><div class="card-header"><div class="card-title">◆ API Keys</div><button class="btn btn-ghost btn-sm" onclick="loadAllKeys()">↺ Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Key</th><th>Label</th><th>Admin</th><th>Type</th><th>Expires</th><th>Usage</th><th>Status</th><th></th></tr></thead><tbody id="allKeysTable"><tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">Loading...</td></tr></tbody></table></div></div>';
  loadAllKeys()
}
async function loadAllKeys(){
  var tb=document.getElementById('allKeysTable');if(!tb)return;
  var r=await api('/admin/api/all-keys');
  if(!r.data.keys||!r.data.keys.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">No keys yet</td></tr>';return}
  tb.innerHTML=r.data.keys.map(function(k){
    var expired=new Date(k.expiresAt)<new Date();
    var st=(!k.isActive||expired)?'<span class="badge badge-red">'+(expired?'Expired':'Off')+'</span>':'<span class="badge badge-green">Active</span>';
    return'<tr><td style="font-family:var(--mono);font-size:.65rem;color:var(--accent3)">'+k.key.substring(0,14)+'... <button class="copy-btn" onclick="copy(\''+k.key+'\')">copy</button></td><td style="color:var(--text2)">'+(k.label||'—')+'</td><td style="font-weight:600;color:var(--text)">'+k.createdBy+'</td><td>'+typeBadge(k.keyType)+'</td><td style="font-family:var(--mono);font-size:.66rem;color:var(--text3)">'+fmtDateShort(k.expiresAt)+'</td><td style="font-family:var(--mono);color:var(--text2)">'+(k.usageLimit?k.usageCount+'/'+k.usageLimit:k.usageCount+'/∞')+'</td><td>'+st+'</td><td><button class="btn btn-red btn-sm" onclick="superDeleteKey(\''+k._id+'\')">Del</button></td></tr>'
  }).join('')
}
async function superDeleteKey(id){
  if(!confirm('Delete this API key?'))return;
  await api('/admin/api/all-keys/'+id,{method:'DELETE'});loadAllKeys()
}
async function init(){
  var m=await api('/admin/api/me');
  if(m.status!==200){window.location.href='/admin';return}
  document.getElementById('topUser').textContent=m.data.username||'—';
  var c=await api('/admin/api/config');API_TYPES=c.data.apiTypes||[];
  renderOverview()
}
init();
</script>
</body>
</html>
