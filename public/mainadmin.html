<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Fighter Modz · Super Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;
  --panel:rgba(255,255,255,0.035);
  --panel-border:rgba(255,255,255,0.09);
  --primary:#5eead4;
  --primary2:#38bdf8;
  --primary3:#a78bfa;
  --text:#eef2f6;
  --text2:#8b93a3;
  --text3:#4b5363;
  --danger:#f87171;
  --warn:#fbbf24;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Sora',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;position:relative}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(94,234,212,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(94,234,212,0.035) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 80%)}
.glow{position:fixed;border-radius:50%;filter:blur(100px);z-index:0;pointer-events:none}
.glow1{width:440px;height:440px;background:rgba(167,139,250,0.09);top:-140px;left:-100px}
.glow2{width:400px;height:400px;background:rgba(56,189,248,0.08);bottom:-120px;right:-90px}

.topbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(11,13,18,0.75);backdrop-filter:blur(18px);border-bottom:1px solid var(--panel-border);z-index:100}
.tb-brand{display:flex;align-items:center;gap:9px}
.tb-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary3),var(--primary2));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:.85rem;color:#0d0a1a}
.tb-name{font-weight:800;font-size:1rem;letter-spacing:-.01em}
.tb-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.28);color:var(--primary3);padding:2px 8px;border-radius:20px}
.tb-right{display:flex;align-items:center;gap:9px}
.pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;background:var(--panel);border:1px solid var(--panel-border);font-size:.75rem}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);box-shadow:0 0 7px var(--primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;border:none;font-size:.76rem;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary3),var(--primary2));color:#0d0a1a;box-shadow:0 6px 20px rgba(167,139,250,0.22)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--panel);border:1px solid var(--panel-border);color:var(--text2)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.16)}
.btn-danger{background:rgba(248,113,113,0.09);border:1px solid rgba(248,113,113,0.25);color:var(--danger)}
.btn-danger:hover{background:rgba(248,113,113,0.16)}
.btn-sm{padding:5px 10px;font-size:.68rem}

.sidebar{position:fixed;top:56px;left:0;bottom:0;width:210px;background:rgba(11,13,18,0.5);backdrop-filter:blur(18px);border-right:1px solid var(--panel-border);padding:18px 11px;z-index:50;overflow-y:auto}
.nav-label{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;padding:0 9px 8px;margin-top:12px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;font-size:.78rem;color:var(--text2);transition:all .15s;position:relative;margin-bottom:2px}
.nav-item:hover{background:var(--panel);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(167,139,250,0.14),rgba(56,189,248,0.07));color:var(--primary3);font-weight:600}
.nav-badge{margin-left:auto;background:rgba(248,113,113,0.14);border:1px solid rgba(248,113,113,0.3);color:var(--danger);font-size:.58rem;font-family:var(--mono);padding:1px 7px;border-radius:20px;font-weight:700}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(11,13,18,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--panel-border);z-index:100;padding:0 8px;align-items:center;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:11px;cursor:pointer;flex:1;max-width:80px;color:var(--text3)}
.bnav-item.active{color:var(--primary3);background:rgba(167,139,250,0.08)}
.bnav-icon{font-family:var(--mono);font-weight:700;font-size:.9rem}
.bnav-label{font-size:.56rem;font-weight:600}

.layout{margin-top:56px;min-height:calc(100vh - 56px);position:relative;z-index:1}
.main{margin-left:210px;padding:24px}
.card{background:var(--panel);border:1px solid var(--panel-border);border-radius:15px;padding:20px;margin-bottom:16px;backdrop-filter:blur(16px);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.22),transparent)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-weight:700;font-size:.88rem}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:13px;padding:17px 15px;text-align:center;backdrop-filter:blur(14px);transition:all .25s}
.stat-card:hover{border-color:rgba(167,139,250,0.28);transform:translateY(-2px)}
.stat-num{font-size:1.85rem;font-weight:800;font-family:var(--mono);background:linear-gradient(135deg,var(--primary3),var(--primary2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.stat-label{font-size:.62rem;color:var(--text3);margin-top:5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;font-family:var(--mono)}

.table-wrap{overflow-x:auto;border-radius:11px;border:1px solid var(--panel-border)}
table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:500px}
th{font-family:var(--mono);font-size:.6rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--panel-border)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:.6rem;font-family:var(--mono);font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
.badge-green{background:rgba(94,234,212,0.1);border:1px solid rgba(94,234,212,0.28);color:var(--primary)}
.badge-red{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.28);color:var(--danger)}
.badge-blue{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.28);color:var(--primary2)}
.badge-yellow{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.28);color:var(--warn)}
.badge-purple{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.28);color:var(--primary3)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:var(--mono);font-size:.62rem;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
input[type=text],input[type=password]{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:.8rem;outline:none;transition:all .2s;width:100%}
input:focus{border-color:rgba(167,139,250,0.4);box-shadow:0 0 0 3px rgba(167,139,250,0.09)}
input::placeholder{color:var(--text3)}

.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cb-item{padding:6px 12px;border-radius:8px;border:1px solid var(--panel-border);background:var(--panel);color:var(--text3);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;user-select:none}
.cb-item.checked{background:rgba(167,139,250,0.14);border-color:rgba(167,139,250,0.4);color:var(--primary3)}

.session-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;margin-bottom:8px;gap:12px}
.session-device{font-size:.78rem;font-weight:700;margin-bottom:3px}
.session-meta{font-size:.64rem;color:var(--text3);font-family:var(--mono)}

.ep-item{background:rgba(0,0,0,0.2);border:1px solid var(--panel-border);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.ep-method{display:inline-block;font-size:.56rem;font-family:var(--mono);background:rgba(94,234,212,0.1);border:1px solid rgba(94,234,212,0.28);color:var(--primary);padding:1px 7px;border-radius:4px;margin-right:8px;font-weight:700}
.ep-url{font-family:var(--mono);font-size:.66rem;color:var(--primary2);word-break:break-all}

.msg{margin-top:10px;padding:9px 14px;border-radius:8px;font-size:.76rem;font-weight:600}
.msg-ok{background:rgba(94,234,212,0.1);border:1px solid rgba(94,234,212,0.28);color:var(--primary)}
.msg-err{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.28);color:var(--danger)}
.copy-btn{font-size:.6rem;font-family:var(--mono);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.24);color:var(--primary3);padding:1px 6px;border-radius:4px;cursor:pointer}
.copy-btn:hover{background:rgba(167,139,250,0.2)}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.page-header-icon{width:36px;height:36px;background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(56,189,248,0.08));border:1px solid rgba(167,139,250,0.28);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:.95rem;flex-shrink:0}
.page-header-title{font-size:1.05rem;font-weight:800}
.page-header-sub{font-size:.68rem;color:var(--text3);margin-top:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

@media(max-width:768px){
.sidebar{display:none}
.bottom-nav{display:flex}
.main{margin-left:0;padding:16px 12px;padding-bottom:80px}
.stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.stat-num{font-size:1.5rem}
.grid2{grid-template-columns:1fr}
.card{padding:14px;border-radius:12px}
table{min-width:420px;font-size:.7rem}
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-mark">F</div>
    <span class="tb-name">Fighter Modz API</span>
    <span class="tb-tag">Super Admin</span>
  </div>
  <div class="tb-right">
    <div class="pill"><span class="pill-dot"></span><span id="topUser">—</span></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-label">Overview</div>
    <div class="nav-item active" id="nav-overview" onclick="goTo('overview')">◈ Dashboard</div>
    <div class="nav-item" id="nav-sessions" onclick="goTo('sessions')">◎ Sessions <span class="nav-badge" id="sessionBadge">0</span></div>
    <div class="nav-label">Management</div>
    <div class="nav-item" id="nav-admins" onclick="goTo('admins')">◆ Admins</div>
    <div class="nav-item" id="nav-keys" onclick="goTo('keys')">▤ All Keys</div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<div class="bottom-nav">
  <div class="bnav-item active" id="bnav-overview" onclick="goTo('overview')"><span class="bnav-icon">◈</span><span class="bnav-label">Home</span></div>
  <div class="bnav-item" id="bnav-sessions" onclick="goTo('sessions')"><span class="bnav-icon">◎</span><span class="bnav-label">Sessions</span></div>
  <div class="bnav-item" id="bnav-admins" onclick="goTo('admins')"><span class="bnav-icon">◆</span><span class="bnav-label">Admins</span></div>
  <div class="bnav-item" id="bnav-keys" onclick="goTo('keys')"><span class="bnav-icon">▤</span><span class="bnav-label">Keys</span></div>
</div>

<script>
var API_TYPES=[], currentPane='overview';
async function api(url,opts){opts=opts||{};var res=await fetch(url,Object.assign({headers:{'Content-Type':'application/json'}},opts));return{status:res.status,data:await res.json()}}
function logout(){api('/admin/logout',{method:'POST'}).then(function(){window.location.href='/admin'})}
function parseDevice(ua){ua=ua||'';if(/mobile/i.test(ua))return'Mobile';if(/tablet/i.test(ua))return'Tablet';return'Desktop'}
function fmtDate(d){return new Date(d).toLocaleString()}
function fmtDateShort(d){return new Date(d).toLocaleDateString()}
function typeBadge(t){var a=API_TYPES.find(function(x){return x.type===t});return'<span class="badge badge-blue">'+(a?a.label:t)+'</span>'}
function accessBadges(types){if(!types||types.includes('all'))return'<span class="badge badge-purple">All Access</span>';return types.map(typeBadge).join(' ')}
function copy(t){navigator.clipboard.writeText(t).catch(function(){var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el)})}
function showMsg(id,text,ok){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div class="msg '+(ok?'msg-ok':'msg-err')+'">'+(ok?'✓ ':'✗ ')+text+'</div>';setTimeout(function(){el.innerHTML=''},4000)}

function goTo(pane){
  currentPane=pane;
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});
  var n=document.getElementById('nav-'+pane); if(n)n.classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(function(el){el.classList.remove('active')});
  var bn=document.getElementById('bnav-'+pane); if(bn)bn.classList.add('active');
  ({overview:renderOverview,sessions:renderSessions,admins:renderAdmins,keys:renderKeys})[pane]();
}

async function renderOverview(){
  document.getElementById('mainContent').innerHTML=''
    +'<div class="page-header"><div class="page-header-icon">◈</div><div><div class="page-header-title">Dashboard</div><div class="page-header-sub">System status & quick stats</div></div></div>'
    +'<div class="stats-grid">'
      +'<div class="stat-card"><div class="stat-num" id="sUsers">—</div><div class="stat-label">Total Users</div></div>'
      +'<div class="stat-card"><div class="stat-num" id="sApis">—</div><div class="stat-label">Total APIs</div></div>'
      +'<div class="stat-card"><div class="stat-num" id="sKeys">—</div><div class="stat-label">Generated Keys</div></div>'
      +'<div class="stat-card"><div class="stat-num" id="sActive">—</div><div class="stat-label">Active Keys</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-head"><div class="card-title">My Sessions</div><button class="btn btn-ghost btn-sm" onclick="loadMySessions()">Refresh</button></div><div id="mySessionsWrap"><div style="color:var(--text3);font-size:.78rem">Loading…</div></div></div>'
    +'<div class="card"><div class="card-head"><div class="card-title">API Endpoints</div></div><div id="epList"></div></div>';
  var r=await api('/admin/api/stats');
  document.getElementById('sUsers').textContent = r.data.totalAdmins!==undefined ? r.data.totalAdmins : '—';
  document.getElementById('sApis').textContent = r.data.totalApis!==undefined ? r.data.totalApis : '—';
  document.getElementById('sKeys').textContent = r.data.totalKeys!==undefined ? r.data.totalKeys : '—';
  document.getElementById('sActive').textContent = r.data.activeKeys!==undefined ? r.data.activeKeys : '—';
  var epHtml=''; API_TYPES.forEach(function(a){epHtml+='<div class="ep-item"><span class="ep-method">GET</span><span class="ep-url">'+a.route+'?'+a.paramName+'=VALUE&apikey=YOUR_KEY</span></div>'});
  document.getElementById('epList').innerHTML=epHtml||'<p style="color:var(--text3);font-size:.78rem">No APIs configured.</p>';
  loadMySessions(); refreshSessionBadge();
}

async function loadMySessions(){
  var wrap=document.getElementById('mySessionsWrap'); if(!wrap)return;
  var r=await api('/admin/api/sessions/me');
  wrap.innerHTML=(!r.data.sessions||!r.data.sessions.length)?'<p style="color:var(--text3);font-size:.78rem">No active sessions.</p>':r.data.sessions.map(function(s){return sessionCard(s,true)}).join('');
}
async function refreshSessionBadge(){
  var r=await api('/admin/api/sessions/all'); var c=r.data.total||0;
  var b=document.getElementById('sessionBadge'); if(b)b.textContent=c;
}
function sessionCard(s,canRevoke){
  return '<div class="session-item"><div><div class="session-device">'+parseDevice(s.userAgent)+'</div><div class="session-meta" style="margin-top:3px">IP '+s.ip+' · '+fmtDate(s.createdAt)+'</div><div class="session-meta">Last '+fmtDate(s.lastSeen)+'</div></div>'+(canRevoke?'<button class="btn btn-danger btn-sm" onclick="revokeSession(\''+s._id+'\')">Revoke</button>':'')+'</div>';
}
async function revokeSession(id){
  if(!confirm('Revoke this session?'))return;
  await api('/admin/api/sessions/'+id,{method:'DELETE'});
  if(currentPane==='overview')loadMySessions();
  if(currentPane==='sessions')renderSessions();
  refreshSessionBadge();
}

async function renderSessions(){
  document.getElementById('mainContent').innerHTML='<div class="page-header"><div class="page-header-icon">◎</div><div><div class="page-header-title">Sessions</div><div class="page-header-sub">All active admin sessions</div></div></div><div class="card"><div class="card-head"><div class="card-title">All Active Sessions</div><button class="btn btn-ghost btn-sm" onclick="renderSessions()">Refresh</button></div><div id="allSessionsWrap"><div style="color:var(--text3);font-size:.78rem">Loading…</div></div></div>';
  var r=await api('/admin/api/sessions/all'); refreshSessionBadge();
  var wrap=document.getElementById('allSessionsWrap');
  if(!r.data.byUser||!Object.keys(r.data.byUser).length){wrap.innerHTML='<p style="color:var(--text3);font-size:.78rem">No active sessions.</p>';return;}
  var html='';
  Object.keys(r.data.byUser).forEach(function(user){
    var sessions=r.data.byUser[user], isSA=(user===document.getElementById('topUser').textContent);
    html+='<div style="margin-bottom:18px"><div style="font-family:var(--mono);font-size:.66rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+user+' <span class="badge badge-blue">'+sessions.length+'</span>'+(!isSA?'<button class="btn btn-danger btn-sm" onclick="revokeAllUser(\''+user+'\')">Revoke All</button>':'')+'</div>'+sessions.map(function(s){return sessionCard(s,true)}).join('')+'</div>';
  });
  wrap.innerHTML=html;
}
async function revokeAllUser(username){
  if(!confirm('Revoke ALL sessions for '+username+'?'))return;
  await api('/admin/api/sessions/user/'+username,{method:'DELETE'}); renderSessions();
}

async function renderAdmins(){
  var tc=API_TYPES.map(function(a){return'<div class="cb-item" data-type="'+a.type+'" onclick="toggleCb(this)">'+a.label+'</div>'}).join('');
  document.getElementById('mainContent').innerHTML=''
    +'<div class="page-header"><div class="page-header-icon">◆</div><div><div class="page-header-title">Admins</div><div class="page-header-sub">Create and manage admin accounts</div></div></div>'
    +'<div class="card"><div class="card-head"><div class="card-title">Create Admin</div></div>'
    +'<div class="grid2" style="margin-bottom:14px"><div class="field"><label>Username</label><input type="text" id="newAdminUser" placeholder="admin_name"></div><div class="field"><label>Password</label><input type="password" id="newAdminPass" placeholder="min. 8 characters"></div></div>'
    +'<div class="field"><label>API Access</label><div class="checkbox-group" id="cbGroup"><div class="cb-item checked" data-type="all" onclick="toggleCb(this)">All Access</div>'+tc+'</div></div>'
    +'<div style="margin-top:16px"><button class="btn btn-primary" onclick="createAdmin()">Create Admin</button></div><div id="adminMsg"></div></div>'
    +'<div class="card"><div class="card-head"><div class="card-title">All Admins</div><button class="btn btn-ghost btn-sm" onclick="loadAdminTable()">Refresh</button></div>'
    +'<div class="table-wrap"><table><thead><tr><th>Username</th><th>Access</th><th>Keys</th><th>Sessions</th><th>Created</th><th></th></tr></thead><tbody id="adminTable"><tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">Loading…</td></tr></tbody></table></div></div>';
  loadAdminTable();
}
function toggleCb(el){
  var g=document.getElementById('cbGroup'); if(!g)return;
  var a=g.querySelector('[data-type="all"]');
  if(el.dataset.type==='all'){g.querySelectorAll('.cb-item').forEach(function(c){c.classList.add('checked')})}
  else{
    if(a)a.classList.remove('checked'); el.classList.toggle('checked');
    if(!Array.from(g.querySelectorAll('.cb-item:not([data-type="all"])')).some(function(c){return c.classList.contains('checked')}) && a) a.classList.add('checked');
  }
}
function getSelectedAccess(){
  var g=document.getElementById('cbGroup'); if(!g)return['all'];
  var a=g.querySelector('[data-type="all"]');
  if(a&&a.classList.contains('checked'))return['all'];
  return Array.from(g.querySelectorAll('.cb-item:not([data-type="all"])')).filter(function(c){return c.classList.contains('checked')}).map(function(c){return c.dataset.type});
}
async function loadAdminTable(){
  var tb=document.getElementById('adminTable'); if(!tb)return;
  var r=await api('/admin/api/admins');
  if(!r.data.admins||!r.data.admins.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">No admins yet</td></tr>';return;}
  tb.innerHTML=r.data.admins.map(function(a){
    return '<tr><td style="font-weight:700;color:var(--text)">'+a.username+'</td><td>'+accessBadges(a.allowedTypes)+'</td><td><span class="badge badge-blue">'+a.keyCount+'</span></td><td><span class="badge '+(a.sessionCount>0?'badge-green':'badge-yellow')+'">'+a.sessionCount+'</span></td><td style="font-family:var(--mono);font-size:.64rem;color:var(--text3)">'+fmtDateShort(a.createdAt)+'</td><td><button class="btn btn-danger btn-sm" onclick="deleteAdmin(\''+a.username+'\')">Delete</button></td></tr>';
  }).join('');
}
async function createAdmin(){
  var u=document.getElementById('newAdminUser').value.trim(), p=document.getElementById('newAdminPass').value, t=getSelectedAccess();
  if(!u||!p){showMsg('adminMsg','Fill all fields',false);return;}
  var r=await api('/admin/api/admins',{method:'POST',body:JSON.stringify({username:u,password:p,allowedTypes:t})});
  showMsg('adminMsg', r.data.message||r.data.error, r.status===201);
  if(r.status===201){document.getElementById('newAdminUser').value='';document.getElementById('newAdminPass').value='';loadAdminTable();}
}
async function deleteAdmin(username){
  if(!confirm('Delete admin "'+username+'" and ALL their API keys?'))return;
  var r=await api('/admin/api/admins/'+username,{method:'DELETE'});
  showMsg('adminMsg', r.data.message||r.data.error, r.status===200); loadAdminTable();
}

async function renderKeys(){
  document.getElementById('mainContent').innerHTML=''
    +'<div class="page-header"><div class="page-header-icon">▤</div><div><div class="page-header-title">All Keys</div><div class="page-header-sub">Manage API keys across all admins</div></div></div>'
    +'<div class="card"><div class="card-head"><div class="card-title">API Keys</div><button class="btn btn-ghost btn-sm" onclick="loadAllKeys()">Refresh</button></div>'
    +'<div class="table-wrap"><table><thead><tr><th>Key</th><th>Label</th><th>Admin</th><th>Type</th><th>Expires</th><th>Usage</th><th>Status</th><th></th></tr></thead><tbody id="allKeysTable"><tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">Loading…</td></tr></tbody></table></div></div>';
  loadAllKeys();
}
async function loadAllKeys(){
  var tb=document.getElementById('allKeysTable'); if(!tb)return;
  var r=await api('/admin/api/all-keys');
  if(!r.data.keys||!r.data.keys.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">No keys yet</td></tr>';return;}
  tb.innerHTML=r.data.keys.map(function(k){
    var expired=new Date(k.expiresAt)<new Date();
    var st=(!k.isActive||expired)?'<span class="badge badge-red">'+(expired?'Expired':'Off')+'</span>':'<span class="badge badge-green">Active</span>';
    return '<tr><td style="font-family:var(--mono);font-size:.63rem;color:var(--primary2)">'+k.key.substring(0,14)+'… <button class="copy-btn" onclick="copy(\''+k.key+'\')">copy</button></td>'
      +'<td style="color:var(--text2)">'+(k.label||'—')+'</td>'
      +'<td style="font-weight:700;color:var(--text)">'+k.createdBy+'</td>'
      +'<td>'+typeBadge(k.keyType)+'</td>'
      +'<td style="font-family:var(--mono);font-size:.64rem;color:var(--text3)">'+fmtDateShort(k.expiresAt)+'</td>'
      +'<td style="font-family:var(--mono);color:var(--text2)">'+k.usageCount+'</td>'
      +'<td>'+st+'</td>'
      +'<td><button class="btn btn-danger btn-sm" onclick="superDeleteKey(\''+k._id+'\')">Del</button></td></tr>';
  }).join('');
}
async function superDeleteKey(id){
  if(!confirm('Delete this API key?'))return;
  await api('/admin/api/all-keys/'+id,{method:'DELETE'}); loadAllKeys();
}

async function init(){
  var m=await api('/admin/api/me');
  if(m.status!==200){window.location.href='/admin';return;}
  document.getElementById('topUser').textContent=m.data.username||'—';
  var c=await api('/admin/api/config'); API_TYPES=c.data.apiTypes||[];
  renderOverview();
}
init();
</script>
</body>
</html>
