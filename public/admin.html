<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NexusAPI — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#060914;
  --cyan:#00e5ff;
  --violet:#7c3aed;
  --pink:#f0abfc;
  --emerald:#10b981;
  --red:#f87171;
  --amber:#fbbf24;
  --surface:rgba(255,255,255,0.03);
  --surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(0,229,255,0.15);
  --text:#e2e8f8;
  --muted:#64748b;
  --mono:'DM Mono',monospace;
  --sans:'Syne',sans-serif;
  --nav-w:230px;
}
body{font-family:var(--sans);background:var(--void);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,black 40%,transparent 100%);pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-a{width:500px;height:500px;background:rgba(124,58,237,0.07);top:-200px;left:-150px}
.orb-b{width:300px;height:300px;background:rgba(0,229,255,0.05);bottom:-100px;right:-100px}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:58px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(6,9,20,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-hex{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  font-size:12px;font-weight:800;color:#000;
}
.brand-name{font-size:.95rem;font-weight:800;letter-spacing:.08em}
.brand-badge{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--cyan)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:.78rem}
.u-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 8px var(--emerald)}
.btn-sm-out{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--sans);font-size:.72rem;cursor:pointer;transition:all .2s}
.btn-sm-out:hover{border-color:var(--border2);color:var(--text)}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:58px;left:0;bottom:0;width:var(--nav-w);z-index:50;
  background:rgba(6,9,20,0.5);
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  padding:18px 12px;overflow-y:auto;
}
.nav-sect{margin-bottom:24px}
.nav-lbl{font-family:var(--mono);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px;display:block}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:10px;cursor:pointer;font-size:.8rem;font-weight:600;
  color:var(--muted);transition:all .2s;border:1px solid transparent;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.on{
  background:linear-gradient(135deg,rgba(0,229,255,0.08),rgba(124,58,237,0.06));
  color:var(--cyan);border-color:rgba(0,229,255,0.15);
  box-shadow:0 0 16px rgba(0,229,255,0.05);
}
.nav-ic{font-size:.85rem}

/* ── MAIN ── */
.main{margin-left:var(--nav-w);margin-top:58px;padding:24px;min-height:calc(100vh - 58px);position:relative;z-index:1}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:20px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.2),transparent)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.card-ttl{font-size:.88rem;font-weight:700;color:var(--text)}

/* ── FORM ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:540px){.g2{grid-template-columns:1fr}}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.fld input,.fld select{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;color:var(--text);
  font-family:var(--sans);font-size:.8rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fld input:focus,.fld select:focus{border-color:rgba(0,229,255,0.3);box-shadow:0 0 0 3px rgba(0,229,255,0.06)}
.fld select option{background:#0d1020}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;font-family:var(--sans);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-cyan{background:linear-gradient(135deg,rgba(0,229,255,0.12),rgba(124,58,237,0.1));border:1px solid rgba(0,229,255,0.25);color:var(--cyan)}
.btn-cyan:hover{background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(124,58,237,0.15));transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-red{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red)}
.btn-red:hover{background:rgba(248,113,113,0.15)}
.btn-xs{padding:4px 9px;font-size:.65rem;border-radius:6px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-size:.6rem;font-weight:600}
.b-green{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--emerald)}
.b-red{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red)}
.b-amber{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);color:var(--amber)}
.b-cyan{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--cyan)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.74rem;min-width:520px}
thead tr{background:rgba(255,255,255,0.025)}
th{padding:9px 12px;text-align:left;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
td{padding:9px 12px;border-top:1px solid rgba(255,255,255,0.04);color:rgba(226,232,248,0.8);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}

/* ── KEY DISPLAY ── */
.key-reveal{
  font-family:var(--mono);font-size:.68rem;
  background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.18);
  border-radius:8px;padding:10px 14px;color:var(--cyan);word-break:break-all;
  margin-top:12px;
}
.cp-btn{font-family:var(--mono);font-size:.6rem;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);color:var(--pink);padding:2px 8px;border-radius:5px;cursor:pointer;transition:all .2s}
.cp-btn:hover{background:rgba(124,58,237,0.2)}

/* ── EP ITEM ── */
.ep{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px}
.ep-m{font-family:var(--mono);font-size:.58rem;color:var(--emerald);font-weight:700;margin-right:8px;letter-spacing:.08em}
.ep-u{font-family:var(--mono);font-size:.64rem;color:var(--cyan);word-break:break-all}
.ep-p{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:4px}

/* ── SESSION ITEM ── */
.sess{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;flex-wrap:wrap}

/* ── MSG ── */
.msg{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-family:var(--mono);font-size:.7rem;margin-top:10px}
.msg-ok{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:var(--emerald)}
.msg-err{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red)}

pre{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:var(--mono);font-size:.64rem;color:var(--cyan);overflow-x:auto;white-space:pre-wrap;word-break:break-word}
.spin{display:inline-block;width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--cyan);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:14px;padding-bottom:76px}
  .m-nav{display:flex}
}
@media(min-width:769px){.m-nav{display:none}}
.m-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(6,9,20,0.88);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
}
.m-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;color:var(--muted);transition:all .2s}
.m-nav-item.on{color:var(--cyan)}
.m-nav-ic{font-size:1.15rem}
.m-nav-lbl{font-family:var(--mono);font-size:.52rem;letter-spacing:.08em;text-transform:uppercase}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,229,255,0.2)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-hex">N</div>
    <span class="brand-name">NexusAPI</span>
    <span class="brand-badge">Admin</span>
  </div>
  <div class="topbar-right">
    <div class="user-chip"><span class="u-dot"></span><span id="topUser" style="font-weight:700">—</span></div>
    <button class="btn-sm-out" onclick="logout()">Sign Out</button>
  </div>
</div>

<aside class="sidebar">
  <div class="nav-sect">
    <span class="nav-lbl">Workspace</span>
    <div class="nav-item on" id="nav-keys" onclick="go('keys')"><span class="nav-ic">◆</span> API Keys</div>
    <div class="nav-item" id="nav-sessions" onclick="go('sessions')"><span class="nav-ic">⊙</span> Sessions</div>
    <div class="nav-item" id="nav-test" onclick="go('test')"><span class="nav-ic">◈</span> Test APIs</div>
    <div class="nav-item" id="nav-docs" onclick="go('docs')"><span class="nav-ic">◉</span> Endpoints</div>
  </div>
</aside>

<main class="main" id="mc"></main>

<nav class="m-nav">
  <div class="m-nav-item on" id="mn-keys" onclick="go('keys')"><div class="m-nav-ic">◆</div><div class="m-nav-lbl">Keys</div></div>
  <div class="m-nav-item" id="mn-sessions" onclick="go('sessions')"><div class="m-nav-ic">⊙</div><div class="m-nav-lbl">Sessions</div></div>
  <div class="m-nav-item" id="mn-test" onclick="go('test')"><div class="m-nav-ic">◈</div><div class="m-nav-lbl">Test</div></div>
  <div class="m-nav-item" id="mn-docs" onclick="go('docs')"><div class="m-nav-ic">◉</div><div class="m-nav-lbl">Docs</div></div>
</nav>

<script>
var TYPES=[],ALLOWED=['all'],PANE='keys';

async function api(url,o){o=o||{};var r=await fetch(url,Object.assign({headers:{'Content-Type':'application/json'}},o));return{s:r.status,d:await r.json()}}
function logout(){api('/admin/logout',{method:'POST'}).then(function(){window.location.href='/admin'})}
function dev(ua){ua=ua||'';if(/mobile/i.test(ua))return'📱';if(/tablet/i.test(ua))return'📟';return'🖥'}
function fdt(d){return new Date(d).toLocaleString()}
function fdts(d){return new Date(d).toLocaleDateString()}
function tbadge(t){var a=TYPES.find(function(x){return x.type===t});return'<span class="badge b-cyan">'+(a?a.icon+' '+a.label:t)+'</span>'}
function cp(t){navigator.clipboard.writeText(t).catch(function(){var e=document.createElement('textarea');e.value=t;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e)})}
function msg(id,txt,ok){var e=document.getElementById(id);if(!e)return;e.innerHTML='<div class="msg '+(ok?'msg-ok':'msg-err')+'">'+(ok?'✓ ':'✗ ')+txt+'</div>';setTimeout(function(){e.innerHTML=''},5000)}
function visible(){if(ALLOWED.includes('all'))return TYPES;return TYPES.filter(function(a){return ALLOWED.includes(a.type)})}

function go(p){
  PANE=p;
  document.querySelectorAll('.nav-item').forEach(function(e){e.classList.remove('on')});
  document.querySelectorAll('.m-nav-item').forEach(function(e){e.classList.remove('on')});
  var n=document.getElementById('nav-'+p);if(n)n.classList.add('on');
  var m=document.getElementById('mn-'+p);if(m)m.classList.add('on');
  ({keys:renderKeys,sessions:renderSessions,test:renderTest,docs:renderDocs})[p]();
}

// ── KEYS ──────────────────────────────────────────────────────
async function renderKeys(){
  var opts=visible().map(function(a){return'<option value="'+a.type+'">'+a.icon+' '+a.label+'</option>'}).join('');
  var mc=document.getElementById('mc');
  mc.innerHTML='<div class="card"><div class="card-hd"><div class="card-ttl">⚡ Generate API Key</div></div>'
    +'<div class="g2">'
    +'<div class="fld"><label>API Type</label><select id="kType">'+opts+'</select></div>'
    +'<div class="fld"><label>Label / Note</label><input type="text" id="kLabel" placeholder="e.g. My Bot"></div>'
    +'<div class="fld"><label>Valid For</label><select id="kDays"><option value="0.04">1 Hour</option><option value="3">3 Days</option><option value="7" selected>7 Days</option><option value="15">15 Days</option><option value="30">30 Days</option><option value="90">90 Days</option><option value="365">365 Days</option></select></div>'
    +'<div class="fld"><label>Daily Limit (0=∞)</label><input type="number" id="kDaily" value="0" min="0"></div>'
    +'<div class="fld"><label>Total Limit (0=∞)</label><input type="number" id="kLimit" value="0" min="0"></div>'
    +'</div>'
    +'<button class="btn btn-cyan" onclick="createKey()">⚡ Generate Key</button>'
    +'<div id="kNew" style="display:none;margin-top:14px"><div style="font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-bottom:4px;letter-spacing:.08em;text-transform:uppercase">⚠ Copy now — shown once</div><div class="key-reveal" id="kVal"></div><button class="cp-btn" style="margin-top:8px" onclick="cp(document.getElementById(\'kVal\').textContent.trim())">Copy Key</button></div>'
    +'<div id="kMsg"></div></div>'
    +'<div class="card"><div class="card-hd"><div class="card-ttl">◆ My Keys</div><button class="btn btn-ghost btn-xs" onclick="loadKeys()">↺ Refresh</button></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Key</th><th>Label</th><th>Type</th><th>Expires</th><th>Daily</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody id="kTbl"><tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">Loading…</td></tr></tbody></table></div></div>';
  loadKeys();
}

async function loadKeys(){
  var tb=document.getElementById('kTbl');if(!tb)return;
  var r=await api('/admin/api/my-keys');
  if(!r.d.keys||!r.d.keys.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">No keys yet</td></tr>';return}
  tb.innerHTML=r.d.keys.map(function(k){
    var exp=new Date(k.expiresAt)<new Date();
    var st=!k.isActive?'<span class="badge b-red">Off</span>':exp?'<span class="badge b-amber">Expired</span>':'<span class="badge b-green">Active</span>';
    var daily=k.dailyLimit?k.dailyUsed+'/'+k.dailyLimit:'∞';
    var total=k.usageLimit?k.usageCount+'/'+k.usageLimit:k.usageCount+'/∞';
    return'<tr><td style="font-family:var(--mono);font-size:.64rem;color:var(--cyan)">'+k.key.substring(0,14)+'… <button class="cp-btn" onclick="cp(\''+k.key+'\')">copy</button></td><td>'+(k.label||'—')+'</td><td>'+tbadge(k.keyType)+'</td><td style="font-family:var(--mono);font-size:.64rem">'+fdts(k.expiresAt)+'</td><td style="font-family:var(--mono)">'+daily+'</td><td style="font-family:var(--mono)">'+total+'</td><td>'+st+'</td><td><button class="btn btn-red btn-xs" onclick="delKey(\''+k._id+'\')">Del</button></td></tr>';
  }).join('');
}

async function createKey(){
  var t=document.getElementById('kType');
  var l=document.getElementById('kLabel');
  var d=document.getElementById('kDays');
  var dl=document.getElementById('kDaily');
  var tl=document.getElementById('kLimit');
  if(!t)return;
  var r=await api('/admin/api/my-keys',{method:'POST',body:JSON.stringify({keyType:t.value,label:l?l.value.trim():'',days:d?parseFloat(d.value):7,dailyLimit:dl?parseInt(dl.value)||0:0,usageLimit:tl?parseInt(tl.value)||0:0})});
  if(r.s===201){
    var nd=document.getElementById('kNew'),nv=document.getElementById('kVal');
    if(nd&&nv){nv.textContent=r.d.key;nd.style.display='block'}
    if(l)l.value='';
    loadKeys();
  }else{msg('kMsg',r.d.error||'Failed',false)}
}

async function delKey(id){
  if(!confirm('Delete this key?'))return;
  var r=await api('/admin/api/my-keys/'+id,{method:'DELETE'});
  msg('kMsg',r.d.message||r.d.error,r.s===200);loadKeys();
}

// ── SESSIONS ──────────────────────────────────────────────────
async function renderSessions(){
  document.getElementById('mc').innerHTML='<div class="card"><div class="card-hd"><div class="card-ttl">⊙ My Sessions</div><button class="btn btn-ghost btn-xs" onclick="renderSessions()">↺</button></div><div id="sWrap" style="color:var(--muted);font-size:.78rem">Loading…</div></div>';
  var r=await api('/admin/api/sessions/me');
  var w=document.getElementById('sWrap');
  if(!r.d.sessions||!r.d.sessions.length){w.innerHTML='<p style="color:var(--muted);font-size:.78rem">No active sessions</p>';return}
  w.innerHTML=r.d.sessions.map(function(s){
    return'<div class="sess"><div><div style="font-weight:700;font-size:.8rem">'+dev(s.userAgent)+' '+s.ip+'</div><div style="font-family:var(--mono);font-size:.64rem;color:var(--muted);margin-top:3px">Login: '+fdt(s.createdAt)+'</div><div style="font-family:var(--mono);font-size:.64rem;color:var(--muted)">Last: '+fdt(s.lastSeen)+'</div></div><button class="btn btn-red btn-xs" onclick="revSess(\''+s._id+'\')">Revoke</button></div>';
  }).join('');
}
async function revSess(id){if(!confirm('Revoke?'))return;await api('/admin/api/sessions/'+id,{method:'DELETE'});renderSessions()}

// ── TEST ──────────────────────────────────────────────────────
function renderTest(){
  var mc=document.getElementById('mc');
  var vis=visible();
  if(!vis.length){mc.innerHTML='<div class="card"><p style="color:var(--muted);font-size:.78rem">No API access granted</p></div>';return}
  mc.innerHTML=vis.map(function(a){
    return'<div class="card"><div class="card-hd"><div class="card-ttl">'+a.icon+' Test '+a.label+'</div></div>'
      +'<div class="g2">'
      +'<div class="fld"><label>'+a.paramName.toUpperCase()+'</label><input type="text" id="tv_'+a.type+'" placeholder="Enter '+a.paramName+'…"></div>'
      +'<div class="fld"><label>API Key</label><input type="text" id="tk_'+a.type+'" placeholder="'+a.prefix+'…"></div>'
      +'</div>'
      +'<button class="btn btn-cyan btn-xs" onclick="testApi(\''+a.type+'\',\''+a.route+'\',\''+a.paramName+'\')">▶ Run</button>'
      +'<pre id="tr_'+a.type+'" style="display:none;margin-top:12px"></pre>'
      +'</div>';
  }).join('');
}

async function testApi(type,route,param){
  var v=document.getElementById('tv_'+type);
  var k=document.getElementById('tk_'+type);
  var p=document.getElementById('tr_'+type);
  if(!v||!k)return;
  if(!v.value.trim()||!k.value.trim()){alert('Fill both fields');return}
  p.style.display='block';p.textContent='Loading…';
  var r=await fetch(route+'?'+param+'='+encodeURIComponent(v.value.trim())+'&apikey='+encodeURIComponent(k.value.trim()));
  var d=await r.json();
  p.textContent=JSON.stringify(d,null,2);
}

// ── DOCS ──────────────────────────────────────────────────────
function renderDocs(){
  var mc=document.getElementById('mc');
  var vis=visible();
  var host=window.location.origin;
  mc.innerHTML='<div class="card"><div class="card-hd"><div class="card-ttl">◉ API Reference</div></div>'
    +vis.map(function(a){
      return'<div class="ep"><span class="ep-m">GET</span><span class="ep-u">'+host+a.route+'?'+a.paramName+'=VALUE&apikey=YOUR_KEY</span><div class="ep-p">Prefix: '+a.prefix+'… · Type: '+a.type+'</div></div>';
    }).join('')
    +'</div>';
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  var m=await api('/admin/api/me');
  if(m.s!==200){window.location.href='/admin';return}
  document.getElementById('topUser').textContent=m.d.username||'—';
  ALLOWED=m.d.allowedTypes||['all'];
  var c=await api('/admin/api/config');
  TYPES=c.d.apiTypes||[];
  renderKeys();
}
init();
</script>
