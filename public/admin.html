<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Admin Panel · Fighter Modz</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#05070f;
  --bg1:#0a0e1a;
  --bg2:#0f1525;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.08);
  --glass3:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --green:#00ffc8;
  --green2:rgba(0,255,200,0.12);
  --accent:#c084fc;
  --accent3:#60a5fa;
  --accent4:#f472b6;
  --red:#ff6b8a;
  --yellow:#fbbf24;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --mono:'JetBrains Mono',monospace;
  --sidebar-w:220px;
}

/* ─── ANIME BACKGROUND ──────────────────────────────────────────────────────── */
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg0);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

.bg-canvas{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}

/* Sky gradient */
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, rgba(96,165,250,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 80% 20%, rgba(192,132,252,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 80% at 10% 60%, rgba(0,255,200,0.08) 0%, transparent 50%),
    linear-gradient(180deg, #05070f 0%, #080c1a 40%, #0a0a14 100%);
}

/* Stars */
.stars{position:absolute;inset:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:var(--min,0.1);transform:scale(1)}50%{opacity:var(--max,0.8);transform:scale(1.2)}}

/* Moon */
.moon{
  position:absolute;top:6%;right:12%;
  width:90px;height:90px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #e8eaf0, #c8cadc 60%, #9899b0);
  box-shadow:0 0 40px rgba(200,200,220,0.35),0 0 80px rgba(200,200,220,0.15),inset -8px -8px 20px rgba(0,0,20,0.4);
  animation:moonFloat 8s ease-in-out infinite;
}
.moon::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 65% 40%, rgba(0,0,40,0.25) 20%, transparent 60%);
}
@keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Mountain silhouettes */
.mountains{
  position:absolute;bottom:0;left:0;right:0;height:50%;
}

/* Torii gate SVG */
.torii-wrap{
  position:absolute;bottom:22%;left:50%;transform:translateX(-50%);
  opacity:0.18;
  filter:drop-shadow(0 0 20px rgba(0,255,200,0.3));
  animation:toriiGlow 4s ease-in-out infinite;
}
@keyframes toriiGlow{0%,100%{opacity:0.18;filter:drop-shadow(0 0 20px rgba(0,255,200,0.3))}
50%{opacity:0.25;filter:drop-shadow(0 0 35px rgba(0,255,200,0.5))}}

/* Cherry blossoms */
.petal{
  position:absolute;
  width:8px;height:8px;
  border-radius:50% 0 50% 0;
  background:rgba(244,114,182,0.7);
  animation:fall var(--fall-d,12s) linear var(--fall-delay,0s) infinite;
  top:-10px;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0}
  10%{opacity:0.8}
  90%{opacity:0.6}
  100%{transform:translateY(100vh) rotate(720deg) translateX(var(--drift,50px));opacity:0}
}

/* Aurora lines */
.aurora{
  position:absolute;top:0;left:0;right:0;height:35%;
  background:
    linear-gradient(180deg,transparent,transparent),
    repeating-linear-gradient(105deg,
      transparent 0%, transparent 8%,
      rgba(0,255,200,0.025) 9%, rgba(0,255,200,0.025) 10%,
      transparent 11%, transparent 20%,
      rgba(96,165,250,0.02) 21%, rgba(96,165,250,0.02) 22%,
      transparent 23%
    );
  animation:auroraShift 15s ease-in-out infinite alternate;
}
@keyframes auroraShift{0%{opacity:0.5;transform:scaleX(1)}100%{opacity:1;transform:scaleX(1.05)}}

/* Fireflies */
.firefly{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green),0 0 12px var(--green);
  animation:ffloat var(--ffd,6s) ease-in-out var(--ffdel,0s) infinite alternate;
}
@keyframes ffloat{
  0%{transform:translate(0,0);opacity:0.2}
  30%{opacity:1}
  70%{opacity:0.6}
  100%{transform:translate(var(--fx,30px),var(--fy,-40px));opacity:0.1}
}

/* ─── LAYOUT ─────────────────────────────────────────────────────────────────── */
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ─── TOPBAR ─────────────────────────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:58px;
  background:rgba(5,7,15,0.6);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 30px rgba(0,0,0,0.5);
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--green),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:1rem;color:#000;
  box-shadow:0 0 16px rgba(0,255,200,0.4);
  font-family:'Zen Kaku Gothic New',sans-serif;
}
.brand-name{
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-weight:900;font-size:1.15rem;
  background:linear-gradient(90deg,var(--green),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.05em;
}
.brand-tag{
  font-size:.6rem;padding:2px 8px;border-radius:20px;
  background:rgba(0,255,200,0.1);border:1px solid rgba(0,255,200,0.25);
  color:var(--green);font-weight:700;letter-spacing:.12em;text-transform:uppercase;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:20px;
  background:var(--glass2);border:1px solid var(--border2);
  backdrop-filter:blur(10px);
}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}

/* ─── LAYOUT BODY ──────────────────────────────────────────────────────────── */
.layout{display:flex;flex:1;min-height:calc(100vh - 58px)}

/* ─── SIDEBAR ──────────────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:rgba(5,7,15,0.55);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--border);
  padding:20px 12px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:58px;height:calc(100vh - 58px);
  overflow-y:auto;
}
.nav-section{display:flex;flex-direction:column;gap:3px}
.nav-label{font-size:.6rem;font-weight:700;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;padding:0 10px 8px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:10px;
  cursor:pointer;font-size:.78rem;font-weight:400;
  color:var(--text2);transition:all .2s;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--glass2);color:var(--text);border-color:var(--border)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(0,255,200,0.1),rgba(96,165,250,0.08));
  color:var(--green);border-color:rgba(0,255,200,0.2);
  box-shadow:0 0 20px rgba(0,255,200,0.07);
  font-weight:700;
}
.nav-icon{font-size:.85rem}

/* ─── MAIN ─────────────────────────────────────────────────────────────────── */
.main{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}

/* ─── CARDS ─────────────────────────────────────────────────────────────────── */
.card{
  background:rgba(10,14,26,0.6);
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,200,0.3),rgba(96,165,250,0.2),transparent);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.card-title{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);letter-spacing:.03em}

/* ─── FORM ELEMENTS ─────────────────────────────────────────────────────────── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
input,select{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:8px 12px;
  color:var(--text);
  font-size:.78rem;
  font-family:'Noto Sans JP',sans-serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
input:focus,select:focus{border-color:rgba(0,255,200,0.4);box-shadow:0 0 0 3px rgba(0,255,200,0.08)}
select option{background:#0f1525}

/* ─── BUTTONS ───────────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9px;border:none;
  font-size:.75rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;letter-spacing:.04em;
  transition:all .2s;
}
.btn-green{
  background:linear-gradient(135deg,rgba(0,255,200,0.15),rgba(0,255,200,0.08));
  border:1px solid rgba(0,255,200,0.3);color:var(--green);
  box-shadow:0 0 20px rgba(0,255,200,0.1);
}
.btn-green:hover{background:linear-gradient(135deg,rgba(0,255,200,0.25),rgba(0,255,200,0.15));box-shadow:0 0 30px rgba(0,255,200,0.2);transform:translateY(-1px)}
.btn-primary{
  background:linear-gradient(135deg,rgba(96,165,250,0.15),rgba(192,132,252,0.1));
  border:1px solid rgba(96,165,250,0.3);color:var(--accent3);
}
.btn-primary:hover{background:linear-gradient(135deg,rgba(96,165,250,0.25),rgba(192,132,252,0.18));transform:translateY(-1px)}
.btn-ghost{background:var(--glass);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--glass2);color:var(--text)}
.btn-red{
  background:rgba(255,107,138,0.1);border:1px solid rgba(255,107,138,0.25);color:var(--red);
}
.btn-red:hover{background:rgba(255,107,138,0.2)}
.btn-sm{padding:5px 10px;font-size:.67rem;border-radius:7px}

/* ─── BADGES ────────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;letter-spacing:.06em}
.badge-green{background:rgba(0,255,200,0.1);border:1px solid rgba(0,255,200,0.25);color:var(--green)}
.badge-red{background:rgba(255,107,138,0.1);border:1px solid rgba(255,107,138,0.25);color:var(--red)}
.badge-yellow{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:var(--yellow)}
[class*="badge-type-"]{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);color:var(--accent3)}

/* ─── TABLE ─────────────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.72rem}
thead tr{background:rgba(255,255,255,0.03)}
th{padding:9px 12px;text-align:left;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
td{padding:9px 12px;border-top:1px solid rgba(255,255,255,0.04);color:var(--text2);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}

/* ─── KEY BOX ───────────────────────────────────────────────────────────────── */
.key-box{
  font-family:var(--mono);font-size:.67rem;
  background:rgba(0,255,200,0.05);
  border:1px solid rgba(0,255,200,0.2);
  border-radius:8px;padding:10px 14px;
  color:var(--green);word-break:break-all;
  box-shadow:0 0 20px rgba(0,255,200,0.05);
}
.copy-btn{
  background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);
  color:var(--accent3);border-radius:6px;padding:3px 9px;font-size:.62rem;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;
}
.copy-btn:hover{background:rgba(96,165,250,0.2)}

/* ─── ENDPOINT ITEMS ────────────────────────────────────────────────────────── */
.ep-item{
  background:var(--glass);border:1px solid var(--border);
  border-radius:10px;padding:11px 14px;margin-bottom:8px;
}
.ep-method{font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--green);margin-right:8px}
.ep-url{font-family:var(--mono);font-size:.65rem;color:var(--accent3);word-break:break-all}
.ep-prefix{font-size:.62rem;color:var(--text3);margin-top:4px;font-family:var(--mono)}

/* ─── SESSION ITEMS ─────────────────────────────────────────────────────────── */
.session-item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
  flex-wrap:wrap;
}
.session-device{font-weight:700;font-size:.78rem;margin-bottom:3px}
.session-meta{font-size:.65rem;color:var(--text3)}

/* ─── MSG ───────────────────────────────────────────────────────────────────── */
.msg{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:.72rem;font-weight:600;margin-top:8px}
.msg-ok{background:rgba(0,255,200,0.1);border:1px solid rgba(0,255,200,0.25);color:var(--green)}
.msg-err{background:rgba(255,107,138,0.1);border:1px solid rgba(255,107,138,0.25);color:var(--red)}

pre{
  background:rgba(0,0,0,0.4);border:1px solid var(--border);
  border-radius:10px;padding:12px;
  font-family:var(--mono);font-size:.65rem;color:var(--accent3);
  overflow-x:auto;white-space:pre-wrap;word-break:break-word;
  -webkit-overflow-scrolling:touch;
}

/* ─── SPIN ──────────────────────────────────────────────────────────────────── */
.spin{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--green);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── MOBILE BOTTOM NAV ─────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{display:none}
  .shell{padding-bottom:68px}
  .mobile-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(5,7,15,0.85);
    backdrop-filter:blur(24px);
    border-top:1px solid var(--border2);
    padding:8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .mobile-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:4px 0;cursor:pointer;transition:all .2s;
    color:var(--text3);
  }
  .mobile-nav-item.active{color:var(--green)}
  .mobile-nav-icon{font-size:1.2rem}
  .mobile-nav-label{font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .main{padding:14px}
  .card{padding:14px;border-radius:12px}
  .grid2{grid-template-columns:1fr}
  .topbar{padding:0 14px;height:52px}
  .brand-name{font-size:1rem}
  .moon{width:60px;height:60px;top:4%;right:6%}
}
@media(min-width:769px){
  .mobile-nav{display:none}
}

/* ─── SCROLLBAR ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,255,200,0.3)}

/* ─── SHIMMER ANIMATION FOR ACTIVE NAV ──────────────────────────────────────── */
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
</style>
</head>
<body>

<!-- ── ANIMATED BACKGROUND ─────────────────────────────────────────────────── -->
<div class="bg-canvas">
  <div class="aurora"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <!-- Mountains SVG -->
  <svg class="mountains" viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Far mountains -->
    <polygon points="0,400 180,180 320,260 500,140 680,230 820,100 960,190 1100,130 1260,200 1440,160 1440,400" fill="rgba(10,12,30,0.7)"/>
    <!-- Mid mountains -->
    <polygon points="0,400 100,280 250,320 400,240 560,300 700,200 850,280 1000,210 1150,270 1300,230 1440,260 1440,400" fill="rgba(8,10,22,0.8)"/>
    <!-- Near silhouette -->
    <polygon points="0,400 0,350 200,370 350,330 500,360 650,310 800,340 950,320 1100,350 1280,325 1440,340 1440,400" fill="rgba(5,7,15,0.95)"/>
    <!-- Pine trees silhouette -->
    <g fill="rgba(5,7,15,1)" opacity="0.9">
      <polygon points="80,370 90,340 100,370"/>
      <polygon points="90,370 102,335 114,370"/>
      <polygon points="120,372 132,342 144,372"/>
      <polygon points="1300,365 1312,335 1324,365"/>
      <polygon points="1315,368 1327,338 1339,368"/>
      <polygon points="1340,370 1352,340 1364,370"/>
    </g>
  </svg>

  <!-- Torii Gate -->
  <div class="torii-wrap">
    <svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="20" width="180" height="14" rx="3" fill="var(--green)"/>
      <rect x="18" y="34" width="164" height="10" rx="2" fill="var(--green)"/>
      <rect x="40" y="44" width="12" height="136" rx="3" fill="var(--green)"/>
      <rect x="148" y="44" width="12" height="136" rx="3" fill="var(--green)"/>
      <rect x="46" y="80" width="108" height="8" rx="2" fill="var(--green)" opacity="0.7"/>
    </svg>
  </div>

  <!-- Fireflies -->
  <div id="fireflies"></div>
  <!-- Petals -->
  <div id="petals"></div>
</div>

<!-- ── APP SHELL ────────────────────────────────────────────────────────────── -->
<div class="shell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-mark">A</div>
      <span class="brand-name">Aerivue</span>
      <span class="brand-tag">Admin</span>
    </div>
    <div class="topbar-right">
      <div class="user-pill">
        <span class="user-dot"></span>
        <span id="topUser" style="font-weight:600;color:var(--text);font-size:.78rem">—</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item active" id="nav-keys" onclick="goTo('keys')">
          <span class="nav-icon">◆</span> My Keys
        </div>
        <div class="nav-item" id="nav-sessions" onclick="goTo('sessions')">
          <span class="nav-icon">⊙</span> My Sessions
        </div>
        <div class="nav-item" id="nav-test" onclick="goTo('test')">
          <span class="nav-icon">◈</span> Test APIs
        </div>
      </div>
    </aside>

    <main class="main" id="mainContent"></main>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <div class="mobile-nav-item active" id="mnav-keys" onclick="goTo('keys')">
      <div class="mobile-nav-icon">◆</div>
      <div class="mobile-nav-label">Keys</div>
    </div>
    <div class="mobile-nav-item" id="mnav-sessions" onclick="goTo('sessions')">
      <div class="mobile-nav-icon">⊙</div>
      <div class="mobile-nav-label">Sessions</div>
    </div>
    <div class="mobile-nav-item" id="mnav-test" onclick="goTo('test')">
      <div class="mobile-nav-icon">◈</div>
      <div class="mobile-nav-label">Test</div>
    </div>
  </nav>
</div>

<script>
// ── Background particles ───────────────────────────────────────────────────────
(function(){
  // Stars
  var sc = document.getElementById('stars');
  for(var i=0;i<120;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*2.5+0.5;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*70+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(2+Math.random()*4)+'s;--min:'+(0.05+Math.random()*0.2)+';--max:'+(0.5+Math.random()*0.8)+';animation-delay:'+Math.random()*5+'s';
    sc.appendChild(s);
  }
  // Fireflies
  var fc=document.getElementById('fireflies');
  for(var j=0;j<14;j++){
    var f=document.createElement('div');
    f.className='firefly';
    f.style.cssText='left:'+Math.random()*100+'%;top:'+(40+Math.random()*50)+'%;--ffd:'+(4+Math.random()*8)+'s;--ffdel:'+Math.random()*5+'s;--fx:'+(Math.random()*80-40)+'px;--fy:'+(Math.random()*80-40)+'px';
    fc.appendChild(f);
  }
  // Petals
  var pc=document.getElementById('petals');
  for(var k=0;k<20;k++){
    var p=document.createElement('div');
    p.className='petal';
    p.style.cssText='left:'+Math.random()*100+'%;--fall-d:'+(10+Math.random()*10)+'s;--fall-delay:'+Math.random()*12+'s;--drift:'+(Math.random()*100-50)+'px;opacity:'+(0.5+Math.random()*0.5)+';transform:scale('+(0.6+Math.random()*0.8)+') rotate('+Math.random()*360+'deg)';
    pc.appendChild(p);
  }
})();

// ── App logic (same as original + mobile nav support) ─────────────────────────
var API_TYPES=[];
var allowedTypes=['all'];
var currentPane='keys';

async function api(url,opts){
  opts=opts||{};
  var res=await fetch(url,Object.assign({headers:{'Content-Type':'application/json'}},opts));
  return{status:res.status,data:await res.json()};
}

function logout(){api('/admin/logout',{method:'POST'}).then(function(){window.location.href='/admin'});}

function parseDevice(ua){
  ua=ua||'';
  if(!ua)return'🖥 Unknown';
  if(/mobile/i.test(ua))return'📱 Mobile';
  if(/tablet/i.test(ua))return'📟 Tablet';
  return'🖥 Desktop';
}
function fmtDate(d){return new Date(d).toLocaleString()}
function fmtDateShort(d){return new Date(d).toLocaleDateString()}

function typeBadge(type){
  var a=API_TYPES.find(function(x){return x.type===type});
  return'<span class="badge badge-type-'+type+'">'+(a?a.icon+' '+a.label:type)+'</span>';
}
function copy(t){
  navigator.clipboard.writeText(t).catch(function(){
    var el=document.createElement('textarea');
    el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
  });
}
function showMsg(id,text,ok){
  var el=document.getElementById(id);if(!el)return;
  el.innerHTML='<div class="msg '+(ok?'msg-ok':'msg-err')+'">'+(ok?'✓ ':'✗ ')+text+'</div>';
  setTimeout(function(){el.innerHTML=''},5000);
}
function visibleTypes(){
  if(allowedTypes.includes('all'))return API_TYPES;
  return API_TYPES.filter(function(a){return allowedTypes.includes(a.type)});
}

function goTo(pane){
  currentPane=pane;
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});
  document.querySelectorAll('.mobile-nav-item').forEach(function(el){el.classList.remove('active')});
  var navEl=document.getElementById('nav-'+pane);
  if(navEl)navEl.classList.add('active');
  var mnavEl=document.getElementById('mnav-'+pane);
  if(mnavEl)mnavEl.classList.add('active');
  var fns={keys:renderKeys,sessions:renderSessions,test:renderTest};
  if(fns[pane])fns[pane]();
}

// ── KEYS ──────────────────────────────────────────────────────────────────────
async function renderKeys(){
  var typeOptions=visibleTypes().map(function(a){return'<option value="'+a.type+'">'+a.icon+' '+a.label+'</option>'}).join('');
  var epItems=visibleTypes().map(function(a){
    return'<div class="ep-item"><span class="ep-method">GET</span><span class="ep-url">'+a.route+'?'+a.paramName+'=VALUE&apikey=YOUR_KEY</span><div class="ep-prefix">Prefix: '+a.prefix+'...</div></div>';
  }).join('');
  var mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="card"><div class="card-header"><div class="card-title">⚡ Generate Key</div></div><div class="grid2"><div class="field"><label>API Type</label><select id="keyType">'+typeOptions+'</select></div><div class="field"><label>Label</label><input type="text" id="keyLabel" placeholder="e.g. My App"></div><div class="field"><label>Expires In</label><select id="keyExpiry"><option value="1">1 Day</option><option value="7" selected>7 Days</option><option value="30">30 Days</option><option value="90">90 Days</option><option value="365">1 Year</option></select></div><div class="field"><label>Usage Limit (0 = unlimited)</label><input type="number" id="keyLimit" value="0" min="0"></div></div><button class="btn btn-green" onclick="createKey()">⚡ Generate Key</button><div id="newKeyDisplay" style="display:none;margin-top:14px"><div style="font-size:.62rem;color:var(--text3);margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase">⚠ Save this key — shown only once</div><div class="key-box" id="newKeyVal"></div><button class="copy-btn" style="margin-top:8px" onclick="copy(document.getElementById(\'newKeyVal\').textContent.trim())">Copy Key</button></div><div id="keyMsg"></div></div><div class="card"><div class="card-header"><div class="card-title">◆ My API Keys</div><button class="btn btn-ghost btn-sm" onclick="loadMyKeys()">↺ Refresh</button></div><div class="table-wrap"><table><thead><tr><th>Key</th><th>Label</th><th>Type</th><th>Expires</th><th>Usage</th><th>Status</th><th></th></tr></thead><tbody id="myKeysTable"><tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Loading...</td></tr></tbody></table></div></div><div class="card"><div class="card-header"><div class="card-title">◈ Endpoint Reference</div></div>'+(epItems||'<p style="color:var(--text3);font-size:.78rem">No API access granted.</p>')+'</div>';
  loadMyKeys();
}

async function loadMyKeys(){
  var tb=document.getElementById('myKeysTable');if(!tb)return;
  var r=await api('/admin/api/my-keys');
  if(!r.data.keys||!r.data.keys.length){
    tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">No keys created yet</td></tr>';return;
  }
  tb.innerHTML=r.data.keys.map(function(k){
    var exp=new Date(k.expiresAt);
    var expired=exp<new Date();
    var st;
    if(!k.isActive)st='<span class="badge badge-red">Off</span>';
    else if(expired)st='<span class="badge badge-yellow">Expired</span>';
    else st='<span class="badge badge-green">Active</span>';
    var use=k.usageLimit?k.usageCount+'/'+k.usageLimit:k.usageCount+'/∞';
    return'<tr><td style="font-family:var(--mono);font-size:.66rem;color:var(--accent3)">'+k.key.substring(0,16)+'... <button class="copy-btn" onclick="copy(\''+k.key+'\')">copy</button></td><td>'+(k.label||'—')+'</td><td>'+typeBadge(k.keyType)+'</td><td style="font-family:var(--mono);font-size:.66rem">'+fmtDateShort(k.expiresAt)+'</td><td style="font-family:var(--mono)">'+use+'</td><td>'+st+'</td><td><button class="btn btn-red btn-sm" onclick="deleteKey(\''+k._id+'\')">Delete</button></td></tr>';
  }).join('');
}

async function createKey(){
  var keyTypeEl=document.getElementById('keyType');
  var keyLabelEl=document.getElementById('keyLabel');
  var keyExpiryEl=document.getElementById('keyExpiry');
  var keyLimitEl=document.getElementById('keyLimit');
  if(!keyTypeEl)return;
  var r=await api('/admin/api/my-keys',{method:'POST',body:JSON.stringify({label:keyLabelEl?keyLabelEl.value.trim():'',days:keyExpiryEl?parseInt(keyExpiryEl.value):7,usageLimit:keyLimitEl?(parseInt(keyLimitEl.value)||0):0,keyType:keyTypeEl.value})});
  if(r.status===201){
    var display=document.getElementById('newKeyDisplay');
    var val=document.getElementById('newKeyVal');
    if(display&&val){val.textContent=r.data.key;display.style.display='block';}
    if(keyLabelEl)keyLabelEl.value='';
    loadMyKeys();
  }else{showMsg('keyMsg',r.data.error||'Failed to create key',false);}
}

async function deleteKey(id){
  if(!confirm('Delete this API key? This cannot be undone.'))return;
  var r=await api('/admin/api/my-keys/'+id,{method:'DELETE'});
  showMsg('keyMsg',r.data.message||r.data.error,r.status===200);
  loadMyKeys();
}

// ── SESSIONS ──────────────────────────────────────────────────────────────────
async function renderSessions(){
  var mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="card"><div class="card-header"><div class="card-title">⊙ My Active Sessions</div><button class="btn btn-ghost btn-sm" onclick="renderSessions()">↺ Refresh</button></div><div id="sessionsWrap" style="color:var(--text2);font-size:.78rem">Loading...</div></div>';
  var r=await api('/admin/api/sessions/me');
  var wrap=document.getElementById('sessionsWrap');
  if(!r.data.sessions||!r.data.sessions.length){wrap.innerHTML='<p style="color:var(--text3);font-size:.78rem">No active sessions found.</p>';return;}
  wrap.innerHTML=r.data.sessions.map(function(s){
    return'<div class="session-item"><div><div class="session-device">'+parseDevice(s.userAgent)+'</div><div class="session-meta">IP: '+s.ip+' · Login: '+fmtDate(s.createdAt)+'</div><div class="session-meta">Last seen: '+fmtDate(s.lastSeen)+'</div></div><button class="btn btn-red btn-sm" onclick="revokeSession(\''+s._id+'\')">Revoke</button></div>';
  }).join('');
}

async function revokeSession(id){
  if(!confirm('Revoke this session?'))return;
  await api('/admin/api/sessions/'+id,{method:'DELETE'});
  renderSessions();
}

// ── TEST ──────────────────────────────────────────────────────────────────────
function renderTest(){
  var mc=document.getElementById('mainContent');
  var visible=visibleTypes();
  if(!visible.length){mc.innerHTML='<div class="card"><p style="color:var(--text3);font-size:.78rem">No API access has been granted to your account.</p></div>';return;}
  var html='';
  visible.forEach(function(a){
    if(a.type==='image'){
      html+='<div class="card"><div class="card-header"><div class="card-title">'+a.icon+' Test '+a.label+'</div></div><div class="grid2"><div class="field"><label>Prompt</label><input type="text" id="test_image_prompt" placeholder="e.g. futuristic lion logo"></div><div class="field"><label>API Key (img_...)</label><input type="text" id="test_image_key" placeholder="img_..."></div></div><button class="btn btn-primary btn-sm" id="genBtn" onclick="testImage()">Generate</button><div id="genResult" style="margin-top:14px"></div></div>';
    }else{
      html+='<div class="card"><div class="card-header"><div class="card-title">'+a.icon+' Test '+a.label+'</div></div><div class="grid2"><div class="field"><label>'+a.paramName.toUpperCase()+'</label><input type="text" id="test_'+a.type+'_val" placeholder="Enter '+a.paramName+'..."></div><div class="field"><label>API Key ('+a.prefix+'...)</label><input type="text" id="test_'+a.type+'_key" placeholder="'+a.prefix+'..."></div></div><button class="btn btn-primary btn-sm" onclick="testGeneric(\''+a.type+'\',\''+a.route+'\',\''+a.paramName+'\')">Test</button><pre id="result_'+a.type+'" style="display:none;margin-top:12px"></pre></div>';
    }
  });
  mc.innerHTML=html;
}

async function testGeneric(type,route,paramName){
  var val=document.getElementById('test_'+type+'_val');
  var key=document.getElementById('test_'+type+'_key');
  var pre=document.getElementById('result_'+type);
  if(!val||!key)return;
  if(!val.value.trim()||!key.value.trim()){alert('Fill both fields');return;}
  var res=await fetch(route+'?'+paramName+'='+encodeURIComponent(val.value.trim())+'&apikey='+encodeURIComponent(key.value.trim()));
  var data=await res.json();
  pre.style.display='block';pre.textContent=JSON.stringify(data,null,2);
}

async function testImage(){
  var promptEl=document.getElementById('test_image_prompt');
  var keyEl=document.getElementById('test_image_key');
  var btn=document.getElementById('genBtn');
  var res=document.getElementById('genResult');
  if(!promptEl||!keyEl)return;
  var prompt=promptEl.value.trim();var key=keyEl.value.trim();
  if(!prompt||!key){alert('Fill both fields');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Generating...';
  res.innerHTML='<div style="color:var(--text2);font-size:.78rem">Starting generation...</div>';
  try{
    var r=await fetch('/generate?prompt='+encodeURIComponent(prompt)+'&apikey='+encodeURIComponent(key));
    var d=await r.json();
    if(!r.ok){res.innerHTML='<pre>'+JSON.stringify(d,null,2)+'</pre>';btn.disabled=false;btn.textContent='Generate';return;}
    var taskId=d.task_id;
    res.innerHTML='<div style="color:var(--text2);font-size:.78rem">Task: <code style="color:var(--accent)">'+taskId+'</code> — polling...</div>';
    var attempts=0;
    var poll=setInterval(async function(){
      attempts++;
      var cr=await fetch('/generate/check?task_id='+encodeURIComponent(taskId)+'&apikey='+encodeURIComponent(key));
      var cd=await cr.json();
      if(cd.image_url){
        clearInterval(poll);
        res.innerHTML='<div style="color:var(--green);font-size:.78rem;margin-bottom:8px">✓ Image ready!</div><img src="'+cd.image_url+'" style="max-width:100%;border-radius:8px;border:1px solid var(--border)"><div style="margin-top:8px"><a href="'+cd.image_url+'" target="_blank" class="btn btn-primary btn-sm">Open Image</a></div>';
        btn.disabled=false;btn.textContent='Generate';
      }else if(attempts>30){
        clearInterval(poll);
        res.innerHTML='<div style="color:var(--yellow)">⚠ Timed out. Try again.</div>';
        btn.disabled=false;btn.textContent='Generate';
      }
    },3000);
  }catch(e){
    res.innerHTML='<div style="color:var(--red)">Error: '+e.message+'</div>';
    btn.disabled=false;btn.textContent='Generate';
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  var meRes=await api('/admin/api/me');
  if(meRes.status!==200){window.location.href='/admin';return;}
  document.getElementById('topUser').textContent=meRes.data.username||'—';
  allowedTypes=meRes.data.allowedTypes||['all'];
  var cfgRes=await api('/admin/api/config');
  API_TYPES=cfgRes.data.apiTypes||[];
  renderKeys();
}

init();
</script>
